<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLACKOUT OS</title>
<style>
  :root{
    --bg:#070a07; --term-bg:#0a0f0a; --green:#43e07a; --green-dim:#2a8a4d;
    --amber:#e0b343; --red:#e0533f; --cyan:#3fd0e0; --panel:#0d120d;
    --border:#16331f; --browser-bg:#11131a; --browser-fg:#c8d0d8;
    --link:#6db8ff; --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --ui:-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#04060a;color:var(--green);font-family:var(--mono);font-size:13px}

  /* ---- desktop ---- */
  #desktop{position:fixed;inset:0;
    background:
      radial-gradient(1300px 760px at 68% -8%, #18301f, transparent),
      radial-gradient(900px 600px at 15% 110%, #112418, transparent),
      linear-gradient(160deg,#0c141a,#121822 58%,#0e1812);
  }
  #desktop::after{content:"";position:fixed;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(67,224,122,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(67,224,122,.05) 1px,transparent 1px);
    background-size:38px 38px}
  #icons{position:absolute;top:18px;left:18px;display:flex;flex-direction:column;gap:18px;z-index:1}
  .dicon{width:78px;text-align:center;color:#b9c6bd;cursor:pointer;user-select:none;font-family:var(--ui);font-size:11px}
  .dicon .gl{width:52px;height:52px;margin:0 auto 5px;border-radius:12px;background:#0e1510;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--green)}
  .dicon:hover .gl{border-color:var(--green-dim);background:#121c14}

  /* ---- windows ---- */
  #windows{position:absolute;inset:0;z-index:5;pointer-events:none}
  .win{position:absolute;pointer-events:auto;background:var(--panel);border:1px solid var(--border);border-radius:9px;box-shadow:0 16px 50px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;min-width:300px;min-height:180px}
  .win.focused{border-color:var(--green-dim);box-shadow:0 18px 60px rgba(0,0,0,.7)}
  .win-title{display:flex;align-items:center;gap:8px;padding:7px 11px;background:#0e140e;cursor:move;user-select:none;border-bottom:1px solid var(--border)}
  .win-title .dot{width:13px;height:13px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;color:transparent;font-family:var(--ui)}
  .win-title:hover .dot{color:rgba(0,0,0,.6)}
  .win-title .dot.close{background:#e0533f} .win-title .dot.min{background:#e0b343} .win-title .dot.max{background:#43e07a}
  .win-resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:3}
  .win-resize::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;border-right:2px solid var(--green-dim);border-bottom:2px solid var(--green-dim);opacity:.5}
  .loadbar{height:2px;width:0;background:#7d59c9;opacity:0;transition:width .25s linear,opacity .25s;box-shadow:0 0 6px #7d59c9}
  #wall{position:fixed;inset:0;z-index:0;pointer-events:none;background-repeat:no-repeat;background-position:center;background-size:cover;filter:grayscale(.35) contrast(1.05) brightness(1.15)}
  body.theme-amber{--green:#e8b13e;--green-dim:#9a7a2a;--link:#ffcf6b}
  body.theme-ice{--green:#56cfe1;--green-dim:#2f8a99;--link:#7fd4ff}
  .win-title .t{flex:1;color:#bdffd0;font-size:12px;font-family:var(--ui);letter-spacing:.4px}
  .win-title .st{color:var(--green-dim);font-size:11px;white-space:nowrap}
  .win-title .st.live{color:var(--red);animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.4}}
  .win-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative}

  /* ---- terminal app ---- */
  .term{background:var(--term-bg);display:flex;flex-direction:column;height:100%;position:relative}
  .term::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px);opacity:.5;z-index:0}
  body.no-scanlines .term::before{display:none}
  .out{flex:1;overflow-y:auto;padding:12px;white-space:pre-wrap;line-height:1.5;z-index:1}
  .inputline{display:flex;padding:8px 12px;border-top:1px solid var(--border);z-index:1;background:var(--term-bg)}
  .prompt{color:var(--green-dim);white-space:pre}
  .cmd{flex:1;background:transparent;border:none;color:var(--green);font-family:var(--mono);font-size:13px;outline:none}
  .c-dim{color:var(--green-dim)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
  .c-cyan{color:var(--cyan)} .c-white{color:#cfe} b{color:#bdffd0}

  .dossier{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;margin:0 0 12px;display:flex;gap:12px;white-space:normal}
  .dossier img{flex:none;width:84px;height:84px;object-fit:cover;border:1px solid var(--green-dim);border-radius:3px;background:#000;filter:grayscale(.3) contrast(1.05)}
  .dossier .meta{font-size:12px;line-height:1.55;min-width:0;overflow-wrap:anywhere}
  .dossier .meta>div{margin:1px 0} .dossier .meta .k{color:var(--green-dim)}

  /* ---- browser app ---- */
  .browser{background:var(--browser-bg);color:var(--browser-fg);display:flex;flex-direction:column;height:100%;overflow:hidden;font-family:var(--ui)}
  .tabstrip{display:flex;align-items:stretch;background:#0f1118;border-bottom:1px solid #262b38;padding:5px 5px 0;gap:3px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;max-width:170px;padding:5px 10px;background:#15171f;border:1px solid #262b38;border-bottom:none;border-radius:6px 6px 0 0;font-size:11px;color:#8c97a8;cursor:pointer;white-space:nowrap}
  .tab.active{background:var(--browser-bg);color:#cdd5e0}
  .tab .tl{overflow:hidden;text-overflow:ellipsis}
  .tab .tx{color:#6a7585;border-radius:3px;padding:0 4px;line-height:1}
  .tab .tx:hover{background:#2a3040;color:#cdd5e0}
  .tabadd{padding:4px 11px;color:#8c97a8;cursor:pointer;font-size:15px;align-self:center;border-radius:4px}
  .tabadd:hover{color:#cdd5e0;background:#181b24}
  .chrome{display:flex;align-items:center;gap:8px;padding:7px 9px;background:#181b24;border-bottom:1px solid #262b38}
  .navbtn{background:#0d0f15;border:1px solid #2a3040;color:#aeb8c6;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){background:#222838}
  .navbtn:disabled{opacity:.3;cursor:default}
  .addr{flex:1;display:flex;align-items:center;background:#0d0f15;border:1px solid #2a3040;border-radius:14px;padding:3px 10px;gap:6px}
  .addr .lock{color:#7d59c9}
  .addr input{flex:1;background:transparent;border:none;color:#aeb8c6;font-size:12px;outline:none;font-family:var(--mono)}
  .page{flex:1;overflow-y:auto;padding:20px 24px;line-height:1.65}
  .page h1{font-size:21px;margin:.2em 0} .page h2{font-size:15px;color:#8c97a8;margin:1.3em 0 .3em}
  .page p{margin:.7em 0}
  .page img.hero{width:100%;height:170px;object-fit:cover;border-radius:8px;margin:6px 0 14px;filter:contrast(1.05)}
  .page .nav{display:flex;flex-wrap:wrap;gap:16px;margin:12px 0 6px;border-bottom:1px solid #262b38;padding-bottom:10px}
  .page .nav a{color:#9fb0c4;font-size:13px}
  .page .team{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:12px 0}
  .page .tm{display:flex;gap:11px;align-items:center;background:#151822;border:1px solid #262b38;border-radius:8px;padding:10px}
  .page .tm img{width:54px;height:54px;border-radius:50%;object-fit:cover;flex:none;filter:grayscale(.15)}
  .page .tm .nm{color:#cfe;font-size:13px} .page .tm .rl{color:#8a94a2;font-size:11px;margin-top:2px}
  .page .brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .page .brand .bz{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#2f6f4a,#1a3a26);display:flex;align-items:center;justify-content:center;color:#bdffd0;font-weight:700;font-size:18px}
  .page .brand h1{font-size:19px}
  /* bright "clearnet" corporate skin — real-website look, distinct from the dark .onion pages */
  .page.skin-corp{background:#eef1f6;color:#1c2430}
  .page.skin-corp h1{color:#0f2238} .page.skin-corp h2{color:#56627a} .page.skin-corp p{color:#2a3340}
  .page.skin-corp .muted{color:#6b7686}
  .page.skin-corp a,.page.skin-corp .nav a{color:#1f6fd6}
  .page.skin-corp .nav{border-bottom:1px solid #d6dce6}
  .page.skin-corp .card{background:#ffffff;border:1px solid #d6dce6;color:#1c2430}
  .page.skin-corp .tm{background:#ffffff;border:1px solid #d6dce6}
  .page.skin-corp .tm .nm{color:#0f2238} .page.skin-corp .tm .rl{color:#6b7686}
  .page.skin-corp .tm img{filter:none}
  .page.skin-corp .pill{background:#e3e8f0;color:#3a4658}
  .page.skin-corp .post{border-left-color:#cfd6e2}
  .page.skin-corp b{color:#0f2238}
  .page.skin-corp .brand .bz{box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .page.skin-corp .frow label{color:#56627a}
  .page.skin-corp .frow input{background:#fff;border:1px solid #c4ccd8;color:#1c2430}
  .page.skin-corp .frow input:focus{border-color:#1f6fd6}
  .page.skin-corp .btn{background:#1f6fd6;border:1px solid #1f6fd6;color:#fff}
  .page.skin-corp .btn:hover{background:#1a5fbf}
  .page a{color:var(--link);cursor:pointer;text-decoration:none} .page a:hover{text-decoration:underline}
  .card{border:1px solid #262b38;border-radius:6px;padding:13px 15px;margin:11px 0;background:#151822}
  .muted{color:#7a8494} .pill{display:inline-block;background:#222838;border-radius:10px;padding:1px 9px;font-size:11px;color:#9fb0c4;margin-right:5px}
  .post{border-left:2px solid #2a3040;padding:5px 0 5px 12px;margin:11px 0}
  .searchbox{display:flex;gap:8px;margin:20px 0}
  .searchbox input{flex:1;background:#0d0f15;border:1px solid #2a3040;border-radius:16px;padding:9px 15px;color:#cdd5e0;font-size:13px;outline:none}
  .res{margin:15px 0} .res .u{color:#5fae6a;font-size:11px} .res .t{color:var(--link);font-size:15px} .res .d{color:#8a94a2;font-size:12px;margin-top:2px}
  .logo-tor{color:#7d59c9;font-weight:700;letter-spacing:1px}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6a7585;gap:14px}
  .spinner{width:30px;height:30px;border:3px solid #222838;border-top-color:#7d59c9;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .page .btn{background:#1f6feb22;border:1px solid #2f81f7;color:#9fc7ff;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:13px;margin-top:6px;font-family:inherit}
  .page .btn:hover{background:#1f6feb33}
  .page .frow{display:flex;flex-direction:column;gap:3px;margin:9px 0}
  .page .frow label{font-size:11px;color:#7a8494}
  .page .frow input{background:#0d0f15;border:1px solid #2a3040;border-radius:5px;padding:7px 10px;color:#cdd5e0;font-size:13px;outline:none}

  /* ---- contracts app ---- */
  .board{height:100%;overflow-y:auto;padding:20px;font-family:var(--ui)}
  .board h1{font-size:22px;letter-spacing:4px;margin:4px 0 2px;color:var(--green);font-family:var(--mono)}
  .board .sub{color:var(--green-dim);margin-bottom:18px;font-size:12px}
  .contract{background:#0b110c;border:1px solid var(--border);border-radius:7px;padding:15px;margin-bottom:14px;cursor:pointer;transition:.15s;position:relative}
  .contract:hover{border-color:var(--green);transform:translateY(-1px)}
  .contract .cn{font-size:16px;color:#bdffd0;font-weight:700;font-family:var(--mono)}
  .contract .payout{position:absolute;top:15px;right:16px;color:var(--amber);font-size:15px;font-family:var(--mono)}
  .contract .diff{font-size:11px;letter-spacing:1px;margin:3px 0 9px}
  .diff-LOW{color:#43e07a} .diff-MEDIUM{color:#e0b343} .diff-HIGH{color:#e0533f}
  .contract .desc{color:#9fb6a6;font-size:12px;line-height:1.5;margin-bottom:11px}
  .contract .tags{display:flex;flex-wrap:wrap;gap:6px}
  .ctag{font-size:10px;color:#9fb0c4;border:1px solid var(--border);border-radius:10px;padding:1px 8px}

  /* ---- notes & files apps ---- */
  .notesapp{height:100%;display:flex;flex-direction:column}
  .notesapp textarea{flex:1;background:#0c110c;border:none;color:#cfe;font-family:var(--mono);font-size:13px;padding:12px;resize:none;outline:none;line-height:1.6}
  .filesapp{height:100%;overflow-y:auto;padding:10px;font-family:var(--ui)}
  .filerow{display:flex;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);color:#cdd5e0;font-size:12px;cursor:pointer}
  .filerow:hover{background:#10180f} .filerow .fi{color:var(--green)} .filerow .fz{margin-left:auto;color:#6a7585}
  .man-body h2{font-size:15px;color:#bdffd0;margin:.4em 0 .5em} .man-body b{color:#bdffd0} .man-body p{margin:.6em 0}
  .man-nav .mi:hover{background:#10180f!important}

  /* ---- taskbar ---- */
  #taskbar{position:fixed;left:0;right:0;bottom:0;height:42px;z-index:40;display:flex;align-items:center;gap:8px;padding:0 10px;
    background:rgba(8,12,8,.92);border-top:1px solid var(--border);backdrop-filter:blur(8px)}
  #start{display:flex;align-items:center;gap:7px;background:#10180f;border:1px solid var(--border);color:var(--green);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:var(--mono);font-size:12px}
  #start:hover{border-color:var(--green-dim)}
  #startmenu{position:fixed;left:10px;bottom:50px;z-index:60;min-width:180px;background:rgba(10,16,11,.97);border:1px solid var(--green-dim);border-radius:8px;padding:6px;backdrop-filter:blur(8px);box-shadow:0 12px 40px rgba(0,0,0,.6)}
  #startmenu.hidden{display:none}
  #startmenu .smi{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:6px;cursor:pointer;color:#cfe;font-family:var(--ui);font-size:12px}
  #startmenu .smi:hover{background:#16241a}
  #startmenu .smi .g{width:18px;text-align:center;color:var(--green)}
  #startmenu .sep{height:1px;background:var(--border);margin:5px 4px}
  #tasklist{display:flex;gap:6px;flex:1;overflow-x:auto}
  .taskbtn{display:flex;align-items:center;gap:6px;background:#0c120c;border:1px solid var(--border);color:#9fb6a6;border-radius:5px;padding:5px 11px;cursor:pointer;font-family:var(--ui);font-size:11px;white-space:nowrap}
  .taskbtn.active{border-color:var(--green-dim);color:#cfe;background:#11190f}
  .taskbtn.min{opacity:.55}
  #tb-status{color:var(--green-dim);font-size:11px;white-space:nowrap;font-family:var(--mono)}
  #tb-status .tr.live{color:var(--red);animation:blink 1s steps(2) infinite}
  #wallet{display:flex;align-items:center;gap:6px;color:var(--amber);font-size:12px;font-family:var(--mono);background:#0c120c;border:1px solid var(--border);border-radius:6px;padding:5px 11px;white-space:nowrap}
  #wallet .wl{color:var(--green-dim);font-size:10px;letter-spacing:.5px}
  #wallet.bump{animation:wbump .5s ease}
  @keyframes wbump{0%{transform:scale(1)}40%{transform:scale(1.18);color:var(--green)}100%{transform:scale(1)}}
  #clock{color:#9fb6a6;font-size:12px;font-family:var(--mono);min-width:54px;text-align:right}

  /* ---- boot & login ---- */
  #boot,#login{position:fixed;inset:0;z-index:100;background:#04060a;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #boot{font-family:var(--mono);color:var(--green-dim);align-items:flex-start;justify-content:flex-start;padding:40px;white-space:pre-wrap;font-size:13px;line-height:1.7;overflow-y:auto}
  #login{gap:20px}
  #login .logo{font-size:40px;letter-spacing:10px;color:var(--green)}
  #login .sub{color:var(--green-dim);letter-spacing:2px;margin-top:-10px}
  #login .av{width:90px;height:90px;border-radius:50%;background:#0e1510;border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:38px;margin-top:14px}
  #login .uname{color:#9fb6a6;letter-spacing:1px;font-size:12px}
  #login-user{background:#0a0f0a;border:1px solid var(--green-dim);color:var(--green);border-radius:6px;padding:9px 14px;font-family:var(--mono);font-size:14px;text-align:center;outline:none;width:220px}
  #login-user:focus{box-shadow:0 0 14px rgba(67,224,122,.2)}
  #login-msg{color:var(--green-dim);font-size:11px;min-height:14px;max-width:300px;text-align:center}
  #login button{background:#10180f;border:1px solid var(--green-dim);color:var(--green);border-radius:7px;padding:10px 28px;cursor:pointer;font-family:var(--mono);font-size:13px}
  #login button:hover{background:#16241400;box-shadow:0 0 18px rgba(67,224,122,.25);background:#13200f}
  .hidden{display:none!important}

  /* ---- CRT / 80s mode ---- */
  #crt{position:fixed;inset:0;z-index:300;pointer-events:none;display:none;
    background:linear-gradient(rgba(67,224,122,0), rgba(67,224,122,.05) 50%, rgba(67,224,122,0));
    background-size:100% 16px}
  body.crt #crt{display:block;animation:crtroll 7s linear infinite}
  @keyframes crtroll{0%{background-position:0 -120vh}100%{background-position:0 120vh}}
  body.crt #crt::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.20) 0 1px, rgba(0,0,0,0) 1px 3px)}
  body.crt #crt::after{content:"";position:absolute;inset:-3%;
    background:radial-gradient(ellipse 76% 72% at center, transparent 46%, rgba(0,0,0,.62) 100%)}
  body.crt #desktop{filter:saturate(1.22) brightness(1.04) blur(.25px)}
  body.crt{animation:crtflicker 6s infinite ease-in-out}
  @keyframes crtflicker{0%,100%{opacity:1}47%{opacity:.98}49%{opacity:.93}51%{opacity:.99}}

  ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:#1d3a26;border-radius:4px}
  .browser ::-webkit-scrollbar-thumb,.page ::-webkit-scrollbar-thumb{background:#2a3040}
</style>
</head>
<body>

<div id="desktop">
  <div id="wall"></div>
  <div id="icons"></div>
  <div id="windows"></div>
</div>

<div id="taskbar">
  <button id="start">▣ BLACKOUT</button>
  <div id="tasklist"></div>
  <div id="tb-status"></div>
  <div id="wallet" title="your balance"><span class="wl">BAL</span><span id="wallet-amt">₿0.0</span></div>
  <div id="clock">--:--</div>
</div>
<div id="startmenu" class="hidden"></div>

<div id="crt"></div>
<div id="boot"></div>
<div id="login" class="hidden">
  <div class="logo">BLACKOUT</div>
  <div class="sub" id="login-sub">// secure operating environment</div>
  <div class="av">☠</div>
  <div class="uname">choose a relay handle</div>
  <input id="login-user" placeholder="handle" autocomplete="off" spellcheck="false" maxlength="16">
  <div id="login-msg"></div>
  <button id="login-btn">unlock relay</button>
</div>

<script>
/* ============================================================================
   BLACKOUT — single source of truth for the version number
   ========================================================================== */
const VERSION = '0.9.0';

/* ============================================================================
   PLAYER PROGRESS — money + completed contracts (persisted to localStorage)
   ========================================================================== */
const PROGRESS=Object.assign({balance:0, completed:[], tools:[]},
  (()=>{ try{ return JSON.parse(localStorage.getItem('blackout_progress')||'{}'); }catch(e){ return {}; } })());
if(!PROGRESS.tools) PROGRESS.tools=[];
if(!PROGRESS.charges) PROGRESS.charges={};
function ownsTool(id){ return PROGRESS.tools.includes(id); }
function saveProgress(){ try{ localStorage.setItem('blackout_progress',JSON.stringify(PROGRESS)); }catch(e){} }
// payouts are written as "₿0.4" strings; parse the number out for arithmetic.
function parsePayout(s){ const m=String(s||'').match(/([\d.]+)/); return m?parseFloat(m[1]):0; }
function fmtBtc(n){ return '₿'+(Math.round(n*100)/100).toFixed(1).replace(/\.0$/,'.0'); }
function updateWallet(bump){
  const el=document.getElementById('wallet-amt'); if(!el) return;
  el.textContent=fmtBtc(PROGRESS.balance);
  if(bump){ const w=document.getElementById('wallet'); if(w){ w.classList.remove('bump'); void w.offsetWidth; w.classList.add('bump'); } }
}
function awardPayout(contract){
  if(!contract) return 0;
  const base=parsePayout(contract.payout);
  const bonus = base * ((S.scrapeLevel||0)*0.1);   // bit-scraper: +10/20/30%
  PROGRESS.balance = Math.round((PROGRESS.balance + base + bonus)*100)/100;

  /* PURPOSE: worldbuilding + utility — players will think to search targets here. feels like a real dark-web service. */
  "credbase.onion":{ title:"CredBase", keywords:"breach credential database index lookup email username password records pwned data",
    html:`<h1>CredBase</h1>
      <div class="muted">indexed breach data · 31.4M records · updated continuously · no query logs · no accounts required</div>
      <p>Search by email address or username. Results show source breach, date indexed, and whether plaintext passwords are present. CredBase does not store or display passwords — only confirms presence and breach provenance.</p>

      </div>
      <div class="card"><b>Recently indexed sources</b>

        <div class="post"><b>StellarBank EU</b> <span class="muted">· credential stuffing event, 2023 · 871 records · <span class="pill">high value — includes auth tokens</span></span></div>
        <div class="post"><b>Veritek Systems</b> <span class="muted">· unpatched legacy portal, 2023 · 12,044 records · bcrypt hashes only</span></div>
        <div class="post"><b>Harlow &amp; Partners LLP</b> <span class="muted">· phishing event, 2022 · 38 records · plaintext · staff accounts only</span></div>
        <div class="post"><b>unnamed healthcare provider</b> <span class="muted">· source redacted at submitter request · 3,200 records · mix of hashed and plaintext</span></div>
        <div class="post"><b>QuikMail (legacy accounts)</b> <span class="muted">· scrape of dormant accounts, 2021 · 88,412 records · MD5 hashed · trivially crackable</span></div>
        <div class="post"><b>DataBridge Analytics</b> <span class="muted">· insider exfil, 2022 · 1,100 records · plaintext · includes recovery email fields</span></div>
        <div class="post"><b>NorthernCircuit Legal</b> <span class="muted">· email forwarding misconfiguration, 2023 · 22 records · staff only · no passwords, email content only</span></div>
      </div>
      <div class="card"><b>Index statistics</b><br>
        <div class="post"><span class="muted">Total records:</span> 31,412,880</div>
        <div class="post"><span class="muted">Sources indexed:</span> 1,847</div>
        <div class="post"><span class="muted">Records with plaintext passwords:</span> 6,104,331 (19.4%)</div>
        <div class="post"><span class="muted">Last updated:</span> 4 minutes ago</div>
      </div>
      <p class="muted" style="font-size:11px">CredBase is an indexing service. We do not sell data. To submit a breach dataset for indexing, contact via <a data-url="credbase.onion/submit">credbase.onion/submit</a>. All submissions are verified before indexing.</p>` },

  /* PURPOSE: lore — the most direct personal voice seeding BLACKOUT unease. mentions routing through BLACKOUT and feeling watched. */
  "soliloquy.onion":{ title:"Soliloquy", keywords:"personal blog guilt surveillance corporate data writing confession relay anonymous exit",
    html:`<h1>Soliloquy</h1>
      <div class="muted">an exit log · no name · no date · updated when it needs to be</div>
      <img class="hero" src="https://picsum.photos/seed/soliloquy_city/640/180">
      <div class="post">
        <b>on leaving</b><br>
        People ask if it was the work or the people. It was neither. The work was fine. The people were mostly fine. It was the thing the work added up to that I couldn't stop thinking about once I saw it. You build something useful. You hand it over. You stop being involved. And somewhere downstream, something happens with it that you didn't design for and weren't consulted about and would have said no to, if anyone had asked, which they didn't. That's not a horror story. It's just the shape of how these things go. I couldn't make myself not know that anymore.
      </div>
      <div class="post">
        <b>on routing</b><br>
        I use BLACKOUT for most of my traffic now. It came recommended by someone I trust and the latency is good and I've had no issues. But I've been reading some threads — <a data-url="signalnoise.onion">signalnoise</a>, a few others — and I'm sitting with an uncomfortable thought. BLACKOUT is useful to me for the same reason the tool I built was useful to my former employer. It routes around the things you don't want to be traced through. Which means whoever runs it sees everything that routes through it. I am assuming they have the same ethics I assumed I had. I don't actually know that.
      </div>
      <div class="post">
        <b>on what I built</b><br>
        I'm not going to say what it was. Not because I think it would identify me — enough time has passed — but because naming it makes it feel like a thing I'm proud of, and I'm not sure I am anymore. It worked very well. It still works very well, as far as I know. I hope whoever runs it now is more careful than I was about who they hand it to.
      </div>
      <div class="post">
        <b>on this page</b><br>
        I'm not looking for absolution and I'm not looking for community. I just needed somewhere to put this that wasn't a private file on a machine I don't trust anymore. If you found this: fine. I'm not hiding it, exactly. I just didn't tell anyone where it is.
      </div>
      <div class="post muted" style="font-size:11px">comments are off. if you want to respond, write it somewhere and hope I find it.</div>` },

  /* PURPOSE: lore + worldbuilding — functional opsec resource that names BLACKOUT directly in a trust-rating article. */
  "coldclock.onion":{ title:"ColdClock", keywords:"opsec guide privacy metadata password relay trust zine anonymous operational security",
    html:`<h1>ColdClock</h1>
      <div class="muted">a practical zine about operational security · no authors listed · updated when something changes · free to copy and distribute</div>
      <p class="muted">ColdClock is not for experts. It's for people who are starting to care about this and don't know where to begin. Articles are short and opinionated. We'd rather be wrong simply than right in a way nobody reads.</p>
      <div class="card">
        <b><a data-url="coldclock.onion/metadata">The metadata problem</a></b><br>
        <p class="muted">Your content might be encrypted. Your metadata almost certainly isn't. The timestamp on a file, the font substitution artefacts that are unique to your OS build, the GPS coordinates baked into a photograph, the invisible yellow dots a colour laser printer leaves on every page — these are fingerprints, and they survive encryption. Encrypting your message and leaving its metadata exposed is like mailing a letter in a sealed envelope with your name and return address on the outside. This article covers what metadata exists, where it comes from, and how to remove it before it becomes a problem.</p>
      </div>
      <div class="card">
        <b><a data-url="coldclock.onion/passwords">Passwords, managers, and why you're doing it wrong</a></b><br>
        <p class="muted">The average person reuses between four and seven passwords across all their accounts. The average person also believes their passwords are too unique to guess. These two facts are not compatible. A password manager solves the reuse problem completely and the memory problem mostly. The one thing it doesn't solve is the master password — which means the master password needs to be good. This article explains what "good" means here and why the common advice (long, random, written down) is actually correct.</p>
      </div>
      <div class="card">
        <b><a data-url="coldclock.onion/relays">Which anonymity relays to trust (and how to think about it)</a></b><br>
        <p class="muted">The relay trust question is harder than it looks. A no-logs policy is a claim, not a guarantee. The only thing you can verify is whether the operator has a track record of transparency and whether there are independent audits of their infrastructure. With that framing, here is our current assessment.</p>
        <p class="muted"><b>Generally reliable:</b> Vermillion, Cascade, Irongate. All three have published independent infrastructure audits and have had clean records through multiple law-enforcement pressure events.</p>
        <p class="muted"><b>Use with caution:</b> BLACKOUT. High performance, wide adoption, and as far as we can determine, no incidents. However, the operator is unknown. There are no published audits. The relay came online quickly and scaled quickly, which is either a sign of good infrastructure investment or a sign that someone with significant resources stood it up for a specific purpose. We are not saying it's compromised. We are saying you cannot verify that it isn't, and that is a meaningful difference.</p>
        <p class="muted"><b>Avoid:</b> anything without a published contact address, anything that went offline for more than a week and came back without explanation, anything recommended exclusively by a single source you haven't independently verified.</p>
      </div>
      <div class="card">
        <b><a data-url="coldclock.onion/devices">Device hygiene: what "clean" actually means</a></b><br>
        <p class="muted">A clean device isn't a device with nothing on it. It's a device where nothing on it can be connected to you. This is a harder problem than it sounds. Article covers airgapping, persistent vs live-boot operating systems, hardware identifiers, and when to burn a device entirely.</p>
      </div>
      <p class="muted" style="font-size:11px">ColdClock is not affiliated with any relay operator, security vendor, or board. We accept no advertising. All articles are reviewed by at least two contributors before publication. To contribute, contact us via the <a data-url="thepit.onion">pit</a> — we check in regularly.</p>` },

  /* PURPOSE: worldbuilding — pure texture. makes the deep web feel like it has quiet, human corners that aren't about crime. */
  "theraft.onion":{ title:"The Raft", keywords:"community quiet invite discussion reading projects archive slow web off-topic",
    html:`<h1>The Raft</h1>
      <div class="muted">est. 2013 · invite only · low volume · no moderation drama · goes quiet sometimes · still here</div>
      <img class="hero" src="https://picsum.photos/seed/theraft_water/640/160">
      <p>The Raft is a small community that has been drifting since 2013. At its peak it had about eighty members. Currently active: somewhere between twelve and twenty, depending on the month. Most people who find their way here were sent by someone who'd been here a while. If you weren't, you're either very good at searching or you got lucky. Either way, you're welcome to read.</p>
      <p class="muted">We don't have rules beyond the obvious. We have norms, which is different. The main one is: don't be faster than the conversation needs to be.</p>
      <div class="card"><b>Active sections</b><br>
        <div class="post"><a data-url="theraft.onion/reading">Reading Room</a> <span class="muted">— communal reading, one book at a time, no schedule. current: something about cartography. 6 active readers.</span></div>
        <div class="post"><a data-url="theraft.onion/projects">Projects</a> <span class="muted">— things members are working on, loose accountability, occasional help. 3 ongoing. 11 archived.</span></div>
        <div class="post"><a data-url="theraft.onion/off-topic">Off-topic</a> <span class="muted">— everything else. 14 threads. most slow. a few that have been going for years.</span></div>
      </div>
      <div class="card"><b>Quiet sections</b> <span class="muted">(still readable, rarely posted in)</span><br>
        <div class="post"><span class="muted">Philosophy — 3 active threads, most last posted months ago.</span></div>
        <div class="post"><span class="muted">Music — nobody posts anymore but nobody wanted to archive it either.</span></div>
        <div class="post"><span class="muted">Tech — we redirect most tech questions to <a data-url="signalnoise.onion">signalnoise</a> now.</span></div>
      </div>
      <div class="card"><b>Recent off-topic posts</b><br>
        <div class="post"><span class="muted">wren:</span> Does anyone else find that the internet feels smaller than it used to? Not in the sense of less content — obviously more content. But fewer places where you'd want to spend time.</div>
        <div class="post"><span class="muted">static_m:</span> Yes. I think the places that felt big were the people in them. When those people left, the place didn't lose content, it lost density.</div>
        <div class="post"><span class="muted">wren:</span> That's exactly it. Density.</div>
        <div class="post"><span class="muted">[ 6 more replies in thread ]</span></div>
      </div>
      <p class="muted" style="font-size:11px">Membership is by invitation from an existing member. There is no application process. If you want to join, find someone who's here and ask them. That's all.</p>` },

  /* PURPOSE: worldbuilding — makes the shadow economy feel real, past its prime. subtle BLACKOUT mention via a vendor note. */
  "undermarket.onion":{ title:"UnderMarket", keywords:"market data identity packages listings vendors reputation buy sell dark web",
    html:`<h1>UnderMarket</h1>
      <div class="muted">grey-market data exchange · est. 2016 · vendor-verified · escrow off-platform since March</div>
      <p>UnderMarket was the second-largest indexed data exchange on this side of the web for about three years. It's smaller now — a few seizures, a few exits, a couple of vendors who got sloppy. What's left is the reliable core. If a listing is here, the vendor has a record.</p>
      <div class="card"><b>Featured listings</b><br>
        <div class="post"><span class="pill">IDENTITY</span> <b>Aged digital identity package — US, 5yr history</b><br>
          <span class="muted">Includes: credit-bureau profile, social presence, 2x government-adjacent account registrations, clean phone number. Verified by two independent buyers. Vendor: SilverSeam. Rep: 96% · 88 sales. Asking: negotiable.</span></div>
        <div class="post"><span class="pill">DATA</span> <b>Corporate email archive — mid-size logistics firm</b><br>
          <span class="muted">3.2GB, 2020–2023, includes attachments. Exfil'd clean, no forensic trail. Relevant for competitive intel or social engineering target development. Vendor: archive_9. Rep: 91% · 34 sales.</span></div>
        <div class="post"><span class="pill">ACCESS</span> <b>Standing access — regional accounting firm, two workstations</b><br>
          <span class="muted">Persistent, admin-level. Has been stable for 6 weeks. Not advertising IDS status. Prefer buyer with a specific job; don't want this sitting idle. Vendor: doorstop. Rep: 88% · 19 sales. Contact via PM only.</span></div>
        <div class="post"><span class="pill">DATA</span> <b>Social graph export — 4,100 nodes, finance sector</b><br>
          <span class="muted">LinkedIn-adjacent scrape, enriched with public records crossref. Useful for mapping org structures or building a target shortlist. Vendor: graphpuller. Rep: 94% · 61 sales.</span></div>
        <div class="post"><span class="pill">IDENTITY</span> <b>Email log archive — personal Gmail-equivalent, 18 months</b><br>
          <span class="muted">Full inbox/sent, includes contact list and attachment filenames. Subject confirmed as a mid-level manager at a financial services company. Vendor: null_trade. Rep: 79% · 12 sales. Newer vendor — price reflects it.</span></div>
      </div>
      <div class="card"><b>Vendor spotlight — GhostRunner_77</b><br>
        <p class="muted">412 completed sales. 98% positive. Specialises in access listings and long-tail data packages. One of maybe four vendors on this board with a genuine track record going back to the old days. Routes exclusively through BLACKOUT — mentions it in every listing as a trust signal. Whether that's reassuring or not probably depends on what you think of BLACKOUT.</p>
        <p class="muted"><a data-url="undermarket.onion/vendor/ghostrunner77">View all listings →</a></p>
      </div>
      <div class="card"><b>Platform notice</b><br>
        <p class="muted">Escrow is currently handled off-platform following the closure of EscrowHaus. The board recommends establishing your own escrow arrangements before transacting. We are not responsible for disputes. Reputation scores are the only guarantee on offer here.</p>
        <p class="muted">Three listings were removed this week for incomplete vendor verification. If your listing disappears without notice, re-submit with a valid reputation reference.</p>
      </div>` },

  /* PURPOSE: worldbuilding — the financial plumbing of the shadow economy. BLACKOUT mentioned in dry technical footnote, not as a banner. */
  "mixchain.onion":{ title:"MixChain", keywords:"bitcoin crypto tumbler mixer anonymise chain coin privacy transaction fee",
    html:`<h1>MixChain</h1>
      <div class="muted">transaction anonymisation service · operational since 2019 · CoinJoin implementation · no accounts required</div>
      <p>MixChain takes your input, breaks it across a pool of unrelated transactions, and delivers equivalent value to your output address minus the service fee. The process takes between 8 and 40 minutes depending on pool depth and the fee tier you select. Your input and output are never directly linked on-chain.</p>
      <div class="card"><b>Start a mix</b><br>
        <div class="frow"><label>input address</label><input placeholder="BTC or XMR address" autocomplete="off"></div>
        <div class="frow"><label>output address</label><input placeholder="where to send the clean output" autocomplete="off"></div>
        <div class="frow"><label>fee tier</label><input placeholder="standard / priority / stealth" autocomplete="off"></div>
        <button class="btn">Submit to pool</button>
        <p class="muted" style="font-size:11px;margin-top:8px">You will receive a transaction ID. Keep it. It is the only way to check your mix status or raise a dispute.</p>
      </div>
      <div class="card"><b>Fee schedule</b><br>
        <div class="post"><b>Standard</b> <span class="muted">— 0.8% fee · estimated 20–40 min · pools every 15 min · recommended for most uses</span></div>
        <div class="post"><b>Priority</b> <span class="muted">— 1.4% fee · estimated 8–15 min · dedicated pool slot · suitable for time-sensitive work</span></div>
        <div class="post"><b>Stealth</b> <span class="muted">— 2.0% fee · estimated 30–90 min · split across 6+ pools, additional delay hops · for high-value or high-scrutiny transactions</span></div>
      </div>
      <div class="card"><b>Current pool status</b><br>
        <div class="post"><span class="muted">Standard pool:</span> 14 transactions queued · next dispatch in ~8 min</div>
        <div class="post"><span class="muted">Priority pool:</span> 3 transactions queued · next dispatch in ~3 min</div>
        <div class="post"><span class="muted">Stealth pool:</span> 7 transactions queued across 3 sub-pools · rolling dispatch</div>
        <div class="post"><span class="muted">Last completed mix:</span> 4 minutes ago</div>
      </div>
      <div class="card"><b>Technical notes</b><br>
        <p class="muted">MixChain uses a CoinJoin variant with randomised delay injection. Outputs are never rounded to neat values — rounded outputs are a common chain-analysis fingerprint. Input and output addresses are never stored after a mix completes. Transaction IDs are hashed and stored for dispute resolution only, for 72 hours.</p>
        <p class="muted">Traffic between your session and this service routes through the BLACKOUT relay by default. You can disable this in the connection settings if you have a preferred routing path, but we recommend leaving it enabled. We have found BLACKOUT reliable. We do not have a formal relationship with the operator.</p>
      </div>
      <p class="muted" style="font-size:11px">MixChain is a privacy tool. We do not verify the source or intended use of funds submitted to the service. Use of this service is subject to the laws of your jurisdiction. We operate from a jurisdiction that does not criminalise transaction privacy.</p>` },

  /* PURPOSE: worldbuilding + utility — ties directly into the upload terminal command. purely functional, no lore needed. */
  "vaultdrop.onion":{ title:"VaultDrop", keywords:"dead drop file upload secure anonymous delete 72 hours drop id retrieve exfil",
    html:`<h1>VaultDrop</h1>
      <div class="muted">anonymous file dead drop · no accounts · drops expire after 72 hours · no logs kept post-expiry</div>
      <p>Upload a file, get a drop ID. Give the ID to whoever needs the file. They retrieve it. After 72 hours the file and all associated metadata are deleted. That's the whole service.</p>
      <p>From the terminal, use <b>upload vaultdrop.onion</b> to push a file from your local machine directly to a new drop. The drop ID will be printed to your terminal on completion.</p>
      <div class="card"><b>Retrieve a drop</b><br>
        <div class="frow"><label>drop ID</label><input class="vd-id" placeholder="e.g. 7f3a91c2b4e8d056..." autocomplete="off"></div>
        <button class="btn" onclick="this.parentNode.querySelector('.vd-msg').innerHTML='&#9888; too many requests from relays — retrieval throttled. try again later.'">Retrieve</button>
        <div class="vd-msg c-amber" style="margin-top:8px;font-size:12px"></div>
        <p class="muted" style="font-size:11px;margin-top:8px">If the drop exists and has not expired, the file will be available immediately. Drops can only be retrieved once unless the uploader enabled multi-retrieve at upload time.</p>
      </div>
      <div class="card"><b>Recent drop activity</b> <span class="muted">(IDs only — contents and uploaders are never shown)</span><br>
        <div class="post"><span class="muted">7f3a91c2b4e8d056af221c · uploaded 11 min ago · 2.1 MB · expires in 71h 49m</span></div>
        <div class="post"><span class="muted">a0c38d7e19f5b2441e90cc · uploaded 1h 4min ago · 340 KB · expires in 70h 56m</span></div>
        <div class="post"><span class="muted">cc14872fe30a5d91b7280f · uploaded 3h 22min ago · 18.7 MB · expires in 68h 38m</span></div>
        <div class="post"><span class="muted">5b9e04c1d86f3a72092dab · uploaded 9h 11min ago · 1.4 MB · expires in 62h 49m</span></div>
        <div class="post"><span class="muted">31f8cc5a0b4e9d267af103 · uploaded 19h 3min ago · 8.2 MB · expires in 52h 57m</span></div>
        <div class="post"><span class="muted">e72b3f1409cd58a06e49d5 · uploaded 31h 44min ago · 520 KB · expires in 40h 16m</span></div>
      </div>
      <p class="muted" style="font-size:11px">VaultDrop stores nothing beyond the file and its expiry timestamp. There is no uploader record, no IP log, no access history. After 72 hours, secure deletion runs automatically. We cannot recover expired drops. We cannot tell you who uploaded a drop. We cannot tell you if a specific drop has been retrieved.</p>` },

  /* PURPOSE: lore — the submission note about relay operators is the hook, buried in policy text where it belongs. */
  "whistlehub.onion":{ title:"WhistleHub", keywords:"whistleblower leak documents submit secure anonymous journalist press tip submission",
    html:`<h1>WhistleHub</h1>
      <div class="muted">secure document submission · anonymous tip line · affiliated independent press · operational since 2018</div>
      <p>WhistleHub exists so that people who have access to information the public should see have somewhere to send it. Submissions are encrypted in transit and at rest. We do not log IP addresses. We do not know who you are and we do not want to.</p>
      <p>Affiliated outlets review submissions and decide independently whether to publish. WhistleHub does not make editorial decisions. We are a conduit, not a publisher.</p>
      <div class="card"><b>How it works</b><br>
        <div class="post"><b>1. Submit</b> <span class="muted">— Upload your document or paste text via the secure form. Add a brief description of the context. Do not include identifying details about yourself.</span></div>
        <div class="post"><b>2. Receive your receipt code</b> <span class="muted">— You will be shown a unique alphanumeric code. Write it down. This is your only way to check the status of your submission or communicate with a reviewing journalist.</span></div>
        <div class="post"><b>3. Check back</b> <span class="muted">— Return to this page and enter your receipt code. If a journalist has questions or your submission is under active review, they will leave a message here. Check periodically — response times vary from days to weeks.</span></div>
      </div>
      <div class="card"><b>Submit a document</b><br>
        <div class="frow"><label>context / description</label><input placeholder="brief summary — no identifying details" autocomplete="off"></div>
        <div class="frow"><label>paste text or file contents</label><input placeholder="or use the file upload form below" autocomplete="off"></div>
        <button class="btn">Submit securely</button>
      </div>
      <div class="card"><b>Check submission status</b><br>
        <div class="frow"><label>receipt code</label><input placeholder="your 12-character receipt code" autocomplete="off"></div>
        <button class="btn">Check status</button>
      </div>
      <div class="card"><b>Affiliated outlets</b><br>
        <div class="post"><a data-url="deepfeed.onion">DeepFeed</a> <span class="muted">— breach and leak reporting, dark web focus</span></div>
        <div class="post"><span class="muted">The Meridian Dispatch</span> <span class="muted">— independent investigative, general scope</span></div>
        <div class="post"><span class="muted">Netsec Observer</span> <span class="muted">— technical security and infrastructure reporting</span></div>
        <div class="post"><span class="muted">unnamed outlet</span> <span class="muted">— one affiliated journalist prefers not to be named. submissions flagged for financial sector relevance will reach them.</span></div>
      </div>
      <div class="card"><b>Submission guidelines and scope</b><br>
        <p class="muted">We accept documents, data exports, correspondence, audio, and video. We do not accept submissions that appear to be fabricated or that require us to take a position on an active legal dispute without supporting documentation.</p>
        <p class="muted">Submissions relating to the operation of anonymity infrastructure — relay operators, node ownership, traffic monitoring — are reviewed by a separate internal team before being passed to journalists. This takes longer. If your receipt code shows "under internal review," this is why. We do not explain what the internal review involves.</p>
        <p class="muted">We have received several submissions in this category in the past year. We are treating them carefully.</p>
      </div>
      <p class="muted" style="font-size:11px">WhistleHub is operated by a small volunteer team. We are not funded by any government, media company, or technology firm. If you believe this site has been compromised, do not submit. Contact one of our affiliated outlets directly.</p>` },

  /* --- batch C: the operator's own filter + conspiracy texture --- */

  /* PURPOSE: worldbuilding — diegetic explanation for why no gore/exploitation content exists in this world. */
  "nullfilter.local":{ title:"NULLFILTER — local policy", keywords:"nullfilter content filter policy block local operator personal",
    html:`<div style="border:1px solid #2a8a4d;border-radius:6px;padding:18px;background:#0a120c">
      <h1 style="color:#43e07a;margin:.1em 0">NULLFILTER</h1>
      <div class="muted">local content policy daemon · runs at boot · config: ~/tools/nullfilter.conf</div></div>
      <p>This is mine. I wrote it. It runs before the browser does and it drops routes to a list of categories
      before a single packet leaves this machine. Gore. Exploitation. The trade in real suffering that half of
      this network pretends is just "content." I don't host a route to it, I don't carry traffic for it, and I
      don't take jobs that touch it. Not for any amount.</p>
      <p>People assume that because I do what I do, I'll look at anything. I won't. The deep web is mostly
      boring — markets, forums, people being strange in private — and then there's a floor under that, and I
      filtered the floor out years ago so I'd never load it by accident chasing a lead.</p>
      <h2>What it blocks</h2>
      <p class="muted">Categories are matched on request, by keyword and by a maintained blocklist of known hosts.
      Anything matched is dropped silently with a notice. The list is mine and it is not up for debate.</p>
      <h2>What it doesn't block</h2>
      <p class="muted">Everything else. Crime-adjacent isn't the same as the floor. I'll read a breach forum, a
      market, a paranoid manifesto, a dead man's blog. I draw the line in exactly one place, and I drew it on
      purpose.</p>

/* `decode` tool — auto-detects scheme and decodes, with a short animation in the terminal. */
function decodeTry(raw){
  const s=raw.trim();
  if(/^[01][01\s]*[01]$/.test(s) && s.replace(/\s/g,'').length%8===0){
    try{ const bytes=s.replace(/\s/g,'').match(/.{8}/g).map(b=>parseInt(b,2));
      const t=String.fromCharCode(...bytes); if(/^[\x20-\x7e]+$/.test(t)) return ['binary',t]; }catch(e){} }
  if(/^[0-9a-f][0-9a-f\s]*$/i.test(s) && s.replace(/\s/g,'').length%2===0 && s.replace(/\s/g,'').length>=4){
    try{ const t=s.replace(/\s/g,'').match(/.{2}/g).map(h=>parseInt(h,16)).map(c=>String.fromCharCode(c)).join('');
      if(/^[\x20-\x7e]+$/.test(t)) return ['hexadecimal',t]; }catch(e){} }
  if(/^(\d{1,3})(\s+\d{1,3})+$/.test(s)){
    try{ const t=s.split(/\s+/).map(n=>String.fromCharCode(+n)).join(''); if(/^[\x20-\x7e]+$/.test(t)) return ['decimal ascii',t]; }catch(e){} }
  if(/^[A-Za-z0-9+/]+={0,2}$/.test(s) && s.length%4===0 && s.length>=8){
    try{ const t=atob(s); if(/^[\x20-\x7e]+$/.test(t)) return ['base64',t]; }catch(e){} }
  if(/^[.\-/ ]+$/.test(s)){
    const M={'.-':'a','-...':'b','-.-.':'c','-..':'d','.':'e','..-.':'f','--.':'g','....':'h','..':'i','.---':'j','-.-':'k','.-..':'l','--':'m','-.':'n','---':'o','.--.':'p','--.-':'q','.-.':'r','...':'s','-':'t','..-':'u','...-':'v','.--':'w','-..-':'x','-.--':'y','--..':'z'};
    const t=s.trim().split(/\s+/).map(c=>M[c]||'?').join(''); if(!/\?/.test(t)) return ['morse',t]; }
  return [null,null];
}
async function decodeAnim(raw){
  await typeLine("decode: analysing input ...","c-dim",4); await sleep(260);
  const [scheme,out]=decodeTry(raw);
  if(!scheme){ line("  no known scheme matched. it may be encrypted (needs a key), corrupted, or already plaintext.","c-amber"); return; }
  await typeLine(`  detected: ${scheme}`,"c-cyan",4); await sleep(180);
  await typeLine("  decoding ...","c-dim",4); await sleep(300);
  line(`  ► ${out}`,"c-white");
}

let zTop=10;
const WIN={};   // id -> {el, body, title, statusEl, visible}
function createWindow(id, title, {x=120,y=70,w=560,h=520}={}){
  if(WIN[id]) return WIN[id];
  const el=document.createElement('div'); el.className='win'; el.style.left=x+'px'; el.style.top=y+'px';
  el.style.width=w+'px'; el.style.height=h+'px';

      <span class="t">${title}</span><span class="st"></span>
    </div><div class="win-body"></div><div class="win-resize"></div>`;
  document.getElementById('windows').appendChild(el);
  const rec={el, body:el.querySelector('.win-body'), statusEl:el.querySelector('.st'), title, visible:true, closed:false, id};
  WIN[id]=rec;
  const bar=el.querySelector('.win-title');
  bar.addEventListener('mousedown',e=>{
    const act=e.target.dataset.act;
    if(act){ e.stopPropagation(); if(act==='close')closeWindow(id); else if(act==='min')minimizeWindow(id); else maximizeWindow(id); return; }
    focusWindow(id);
    if(rec._max) return;
    const r=el.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
    const mv=ev=>{ el.style.left=Math.max(0,ev.clientX-ox)+'px'; el.style.top=Math.max(0,ev.clientY-oy)+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  bar.addEventListener('dblclick',e=>{ if(!e.target.dataset.act) maximizeWindow(id); });
  const rz=el.querySelector('.win-resize');
  rz.addEventListener('mousedown',e=>{ e.stopPropagation(); focusWindow(id);
    const sx=e.clientX, sy=e.clientY, sw=el.offsetWidth, sh=el.offsetHeight;
    const mv=ev=>{ el.style.width=Math.max(300,sw+ev.clientX-sx)+'px'; el.style.height=Math.max(180,sh+ev.clientY-sy)+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  el.addEventListener('mousedown',()=>focusWindow(id));
  focusWindow(id);
  return rec;
}
function focusWindow(id){
  const r=WIN[id]; if(!r) return;
  r.visible=true; r.closed=false; r.el.style.display='flex'; r.el.style.zIndex=++zTop;
  Object.values(WIN).forEach(w=>w.el.classList.toggle('focused', w===r));

}
function minimizeWindow(id){ const r=WIN[id]; if(!r)return; r.visible=false; r.el.style.display='none'; renderTaskbar(); }
function closeWindow(id){ const r=WIN[id]; if(!r)return; r.visible=false; r.closed=true; r.el.style.display='none'; renderTaskbar(); }
function maximizeWindow(id){
  const r=WIN[id]; if(!r)return; const el=r.el;
  if(r._max){ Object.assign(el.style, r._prev); r._max=false; }
  else { r._prev={left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
    el.style.left='0px'; el.style.top='0px'; el.style.width='100vw'; el.style.height=(window.innerHeight-42)+'px'; r._max=true; }
  focusWindow(id);
}
function toggleWindow(id){ const r=WIN[id]; if(!r)return;
  if(!r.visible){ focusWindow(id); return; }
  if(r.el.style.zIndex==zTop) minimizeWindow(id); else focusWindow(id); }

function normPath(pth){ const st=[]; for(const seg of pth.split('/')){ if(!seg||seg==='.')continue; if(seg==='..')st.pop(); else st.push(seg);} return '/'+st.join('/'); }
function resolvePath(cwd,arg){ if(!arg) return cwd; return arg.startsWith('/')?normPath(arg):normPath(cwd+'/'+arg); }
function isDir(files,dir){ if(dir==='/'||dir==='') return true; return Object.keys(files).some(k=>k.startsWith(dir+'/')); }
function listDir(files,dir){
  const base=dir==='/'?'':dir, dirs=new Set(), fs=[];
  for(const k of Object.keys(files)){
    if(base===''||k.startsWith(base+'/')){ const rest=k.slice(base.length).replace(/^\//,''); const seg=rest.split('/')[0]; if(!seg)continue;
      if(rest.includes('/')) dirs.add(seg); else fs.push(seg); }
  }
  return {dirs:[...dirs].sort(), files:fs.sort()};
}

const RAND_CHARS='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
function fakePw(){ const n=6+Math.floor(Math.random()*7); let s=''; for(let i=0;i<n;i++) s+=RAND_CHARS[Math.floor(Math.random()*RAND_CHARS.length)]; return s; }
// the base 5000-entry common.txt reaches weak/reused passwords on its own; strong ones derived from a
// target's personal clues only fall once you've built a wordlist from those clues (`wordlist --gen`).
const COMMON_PASSWORDS=new Set(['password','password1','password123','123456','12345678','qwerty','letmein',
  'welcome','admin','admin123','root','toor','changeme','iloveyou','monkey','dragon','sunshine','football',
  'baseball','superman','trustno1','abc123','passw0rd','hunter2','guest','test','login','master','hello123']);
async function crackAnim(m,user,ip){
  if(user!==m.account.user){ line(`crack: ${m.hostname}: no such user '${user}'.`,'c-amber'); return; }
  const pw=m.account.password;
  const inGen=!!(S.wordlist && S.wordlist.includes(pw));
  const hit = inGen || COMMON_PASSWORDS.has(pw.toLowerCase()) || m.weak_pw===true;
  await typeLine(`crack: dictionary attack on ${user}@${ip} (wordlist: common.txt, 5000 entries)`,'c-dim',3);
  const found = hit ? 200+Math.floor(Math.random()*4400) : 5000;   // where in the 5000 it "hits"
  const d=document.createElement('div'); d.className='c-dim'; out.appendChild(d);
  const fast=ownsTool('smartlist'); const dly=fast?12:30; const step=Math.max(20,Math.round(found/(fast?80:45)));
  let i=0;
  while(i<found){ i=Math.min(found,i+step); d.textContent=`  ${String(i).padStart(4)}/5000   ${fakePw()}`; out.scrollTop=out.scrollHeight; await sleep(dly); }
  if(hit){
    d.textContent=`  ${found}/5000   match`;
    S.loud.add(`${user}@${ip}`);   // crack = loud → connecting afterward is traced on IDS hosts
    line(`  password recovered: ${m.account.password}`,'c-cyan');
    line(`  connect ${user}@${ip} ${m.account.password}`,'c-dim');
  } else {
    d.textContent=`  5000/5000   no match`;
    if(!S.wordlist) line(`  not in common.txt — this one isn't weak. read the target's life, then \`wordlist --gen\` and crack again.`,'c-amber');
    else line(`  still not in the list. you're missing a clue — keep digging, then re-gen the wordlist.`,'c-amber');
  }
}

let cmdHist=[], histPtr=0;
function wireInput(){
  cmd.addEventListener('keydown',async e=>{
    if(e.key==='ArrowUp'){ e.preventDefault(); if(cmdHist.length){ histPtr=Math.max(0,histPtr-1); cmd.value=cmdHist[histPtr]||'';
      setTimeout(()=>cmd.setSelectionRange(cmd.value.length,cmd.value.length),0);} return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); if(cmdHist.length){ histPtr=Math.min(cmdHist.length,histPtr+1); cmd.value=cmdHist[histPtr]||'';} return; }
    if(e.key!=='Enter') return;
    const raw=cmd.value.trim(); cmd.value=''; if(!raw) return;
    cmdHist.push(raw); histPtr=cmdHist.length;
    line(`root@${S.conn?activeHost().hostname:'localhost'}:~$ ${raw}`,'c-dim');
    const [name,...rest]=raw.split(/\s+/); const fn=CMD[name];
    if(!fn){ line(`${name}: command not found. try \`help\`.`,'c-amber'); return; }
    // mission commands need an active contract — otherwise W is null and they'd throw.
    const MISSION_CMDS=new Set(['mission','facts','scan','wordlist','crack','connect','exfil','shred','upload']);
    if(MISSION_CMDS.has(name) && !W){ line("no active contract. open Contracts (taskbar ▣) and take a job first.","c-amber"); return; }
    try{ await fn(rest.join(' ')); }catch(err){ line("internal error: "+err.message,'c-red'); }
  });
}

  {id:'browser',   label:'Torch Browser', glyph:'🌐', fn:()=>{ buildBrowser(); if(!currentEntry()) navigate(WEB_START); focusWindow('browser'); }},
  {id:'terminal',  label:'Terminal', glyph:'>_', fn:()=>{ buildTerminal(); focusWindow('terminal'); }},
  {id:'notes',     label:'Notes', glyph:'✎', fn:openNotes},
  {id:'files',     label:'Files', glyph:'▤', fn:openFiles},
  {id:'manual',    label:'Manual', glyph:'?', fn:openManual},
  {id:'settings',  label:'Settings', glyph:'⚙', fn:openSettings}
];
function buildIcons(){
  document.getElementById('icons').innerHTML=ICONS.map(i=>
    `<div class="dicon" data-id="${i.id}"><div class="gl">${i.glyph}</div>${i.label}</div>`).join('');
  document.querySelectorAll('.dicon').forEach(el=>el.ondblclick=el.onclick=()=>ICONS.find(i=>i.id===el.dataset.id).fn());
  const sm=document.getElementById('startmenu');
  sm.innerHTML=ICONS.map(i=>`<div class="smi" data-id="${i.id}"><span class="g">${i.glyph}</span>${i.label}</div>`).join('')
    +`<div class="sep"></div><div class="smi" data-act="reboot"><span class="g">⏻</span>Reboot</div>`;
  sm.querySelectorAll('.smi').forEach(el=>el.onclick=()=>{
    sm.classList.add('hidden');
    if(el.dataset.act==='reboot') rebootOS();
    else ICONS.find(i=>i.id===el.dataset.id).fn();
  });
  document.getElementById('start').onclick=(e)=>{ e.stopPropagation(); sm.classList.toggle('hidden'); };
  document.addEventListener('click',e=>{ if(!sm.contains(e.target) && e.target.id!=='start') sm.classList.add('hidden'); });
}

/* ============================================================================
   BOOT SEQUENCE  (interruptible → drops to an interactive maintenance shell)
   ========================================================================== */
const BOOT_LOGO=
`   ██████╗ ██╗      █████╗  ██████╗██╗  ██╗ ██████╗ ██╗   ██╗████████╗
   ██╔══██╗██║     ██╔══██╗██╔════╝██║ ██╔╝██╔═══██╗██║   ██║╚══██╔══╝
   ██████╔╝██║     ███████║██║     █████╔╝ ██║   ██║██║   ██║   ██║
   ██╔══██╗██║     ██╔══██║██║     ██╔═██╗ ██║   ██║██║   ██║   ██║
   ██████╔╝███████╗██║  ██║╚██████╗██║  ██╗╚██████╔╝╚██████╔╝   ██║
   ╚═════╝ ╚══════╝╚═╝  ╚═╝ ╚═════╝╚═╝  ╚═╝ ╚═════╝  ╚═════╝    ╚═╝`;
async function bootSequence(){
  const b=document.getElementById('boot');
  document.getElementById('login').classList.add('hidden');
  b.classList.remove('hidden');
  const ok='<span style="color:var(--green)">  OK  </span>';
  const dim=s=>`<span style="color:#5f6f63">${s}</span>`;
  // kernel ring-buffer style lines (dmesg) — printed fast, with rising timestamps
  let t=0.0; const ts=()=>{ t+=0.01+Math.random()*0.09; return `[ ${t.toFixed(6).padStart(11)}]`; };
  const kernel=[
    `Linux version 6.9.0-relay (root@blackout) #1 SMP PREEMPT_DYNAMIC`,
    `Command line: BOOT_IMAGE=/boot/vmlinuz-6.9.0-relay ro quiet relay.boot=auto`,
    `CPU: 8 x synthetic cores, relay-hardened microcode 0x1a7`,
    `Memory: 15823M/16384M available (reserving 561M for tmpfs)`,
    `Spectre/Meltdown: mitigations active · randomize_kstack: on`,
    `dm-crypt: probing /dev/relay0 ... LUKS2 header (aes-xts-plain64) found`,
    `random: crng init done (entropy harvested from relay jitter)`,
    `systemd[1]: Detected architecture x86-64. Hostname set to blackout.`
  ];
  // systemd-style mounts + fsck (directories listed) then services
  const fsck=[
    `Found device <b>/dev/relay0</b>.`,
    dim(`         fsck /dev/relay0: clean, 284913/1310720 files, 0 orphan inodes`),
    `Mounted <b>/</b> (root, read-only).`,
    `Mounted <b>/boot</b>.`,
    `Mounted <b>/home</b> (LUKS, encrypted).`,
    `Mounted <b>/var/log/relay</b>.`,
    `Mounted <b>/tmp</b> (tmpfs · RAM-only · wiped on reboot).`,
    `Reached target <b>Local Encrypted Volumes</b>.`
  ];
  const services=[
    `Started udev Kernel Device Manager.`,
    `Started Journal Service (logs route to /var/log/relay).`,
    `Started Onion Circuit Builder (3-hop default).`,
    `Started MAC Address Spoofer.`,
    `Started Kill-Switch Watchdog.`,
    `Started NULLFILTER content-policy daemon.`,
    `Reached target Network (anonymised via relay).`,
    `Started blackwm window manager.`,
    `Reached target Graphical Interface.`
  ];
  // boot is interruptible, but the sequence isn't advertised — it's a real terminal interrupt (Ctrl+C / SIGINT).
  // (the lore conversation between the two operators will reveal/confirm this later.)
  let interrupted=false;
  const onInt=(e)=>{ if(e.ctrlKey && (e.key==='c'||e.key==='C')){ e.preventDefault(); interrupted=true; } };
  window.addEventListener('keydown',onInt);
  b.innerHTML=`<span style="color:var(--green)">${BOOT_LOGO}</span>\n\n`
    +`   BLACKOUT/Linux 6.9.0-relay (tty1) · v${VERSION}\n\n`;
  await sleep(380);
  for(const k of kernel){ if(interrupted) break; b.innerHTML+=`${dim(ts())} ${k}\n`; b.scrollTop=b.scrollHeight; await sleep(55+Math.random()*70); }
  if(!interrupted){ b.innerHTML+=`\n`; await sleep(160); }
  for(const s of fsck){ if(interrupted) break; b.innerHTML+=(s.startsWith('<span')?`${s}\n`:`[${ok}] ${s}\n`); b.scrollTop=b.scrollHeight; await sleep(95+Math.random()*120); }
  for(const s of services){ if(interrupted) break; b.innerHTML+=`[${ok}] ${s}\n`; b.scrollTop=b.scrollHeight; await sleep(120+Math.random()*150); }
  window.removeEventListener('keydown',onInt);
  if(interrupted){
    b.innerHTML+=`\n<span style="color:var(--amber)">^C  caught SIGINT — halting init, dropping to maintenance shell.</span>\n`;
    await sleep(500);
    return maintenanceShell();
  }
  b.innerHTML+=`\n${dim('   starting blackwm session ...')}\n`;
  await sleep(500);
  proceedToLogin();
}
function proceedToLogin(){
  const b=document.getElementById('boot');
  b.classList.add('hidden'); b.onkeydown=null;
  if(PROGRESS.handle) return returningLogin();   // relay remembers you — no handle picker, no rejection
  document.getElementById('login').classList.remove('hidden');
  const u=document.getElementById('login-user'); if(u) setTimeout(()=>u.focus(),50);
}
// generate a believable relay-node IP from a few known hosting ranges
function randRelayIP(){
  const blocks=[[185,220,101],[185,220,100],[51,15,null],[94,142,null],[176,10,null],[199,249,230],
    [104,244,null],[171,25,193],[45,66,null],[162,247,74],[23,129,64],[204,13,164]];
  const b=blocks[Math.floor(Math.random()*blocks.length)];
  const oct=v=>v===null?Math.floor(Math.random()*254)+1:v;
  return `${oct(b[0])}.${oct(b[1])}.${oct(b[2])}.${Math.floor(Math.random()*254)+1}`;
}
async function maintenanceShell(){
  const b=document.getElementById('boot');
  b.innerHTML=`<span style="color:var(--green)">BLACKOUT relay · maintenance shell (recovery tty)</span>\n`
    +`<span style="color:#7d8a7f">root filesystem mounted read-only. type \`help\` for commands, \`continue\` to finish booting.</span>\n\n`;
  const log=document.createElement('span'); b.appendChild(log);
  const promptLine=document.createElement('div'); promptLine.style.cssText='display:flex;gap:6px;align-items:baseline';
  promptLine.innerHTML=`<span style="color:var(--green)">relay:~#</span>`;
  const inp=document.createElement('input');
  inp.style.cssText='flex:1;background:transparent;border:none;outline:none;color:var(--green);font-family:var(--mono);font-size:13px';
  inp.autocomplete='off'; inp.spellcheck=false;
  promptLine.appendChild(inp); b.appendChild(promptLine);
  const echo=(html)=>{ log.innerHTML+=html+'\n'; b.scrollTop=b.scrollHeight; };
  setTimeout(()=>inp.focus(),30);
  b.onclick=()=>inp.focus();
  const SHELL_FILES={
    'relay.conf':`# /etc/blackout/relay.conf  (read-only)\nmode             = transit\nlog_circuits     = true\nlog_retention    = indefinite\nreport_interval  = 30s\nupstream_report  = 185.220.101.99\noperator         = (redacted)`,
    'sessions.log':`relay session table — last rotation: never\n  active sessions : 911\n  this console    : sess#0447   uptime 00:00\n  oldest session  : sess#0001   uptime 2317d   [persistent]\n  flagged         : 0`,
    'motd':`relay0 · message of the day\n\n  authorized maintenance only. activity on this node is reported upstream.\n  session sess#0001 has held this console open for 2317 days. it left one line here:\n\n    "you'll want the room, not the relay.\n     46 . 165 . _ _ _ . 99\n     the middle is counted out on fifteen."`
  };
  return new Promise(resolve=>{
    inp.addEventListener('keydown',async e=>{
      if(e.key!=='Enter') return;
      const raw=inp.value.trim(); inp.value='';
      echo(`<span style="color:var(--green)">relay:~#</span> <span style="color:#cfe">${esc(raw)}</span>`);
      if(!raw) return;
      const [c,...rest]=raw.split(/\s+/); const arg=rest.join(' ');
      switch(c){
        case 'help': echo(
          `  <b>help</b>        this list\n`+
          `  <b>scan</b>        enumerate reachable relay nodes\n`+
          `  <b>ls</b>          list recovery files\n`+
          `  <b>cat</b> &lt;file&gt;   read a file\n`+
          `  <b>who</b>         show sessions on this relay\n`+
          `  <b>whoami</b>      current user\n`+
          `  <b>uname</b>       system information\n`+
          `  <b>clear</b>       clear the screen\n`+
          `  <b>continue</b>    resume booting to the login screen`); break;
        case 'whoami': echo('root  <span style="color:#7d8a7f">(uid=0 · relay maintenance)</span>'); break;
        case 'uname': echo('BLACKOUT/Linux 6.9.0-relay recovery x86_64'); break;
        case 'ls': echo('relay.conf   sessions.log   motd'); break;
        case 'cat':
          if(!arg){ echo('<span style="color:var(--amber)">usage: cat &lt;file&gt;</span>'); break; }
          if(SHELL_FILES[arg]) echo('<span style="color:#bcd">'+esc(SHELL_FILES[arg])+'</span>');
          else echo(`<span style="color:var(--amber)">cat: ${esc(arg)}: no such file</span>`);
          break;
        case 'who': echo(
          '911 sessions attached to relay0.\n'+
          '  sess#0001   ?            2317d   <span style="color:var(--amber)">[persistent · never disconnected]</span>\n'+
          '  sess#0447   '+esc('this console')+'   00:00\n'+
          '  ...909 more (anonymised). use <b>scan</b> to enumerate node addresses.'); break;
        case 'scan': {
          echo('<span style="color:#7d8a7f">scanning relay mesh — enumerating reachable nodes ...</span>');
          await sleep(260);
          const n=180+Math.floor(Math.random()*200);             // a few hundred
          const ips=[]; const seen=new Set(['185.220.101.99']);   // reserve the operator addr so it isn't duplicated
          while(ips.length<n-1){ const ip=randRelayIP(); if(!seen.has(ip)){ seen.add(ip); ips.push(ip); } }
          ips.splice(Math.floor(Math.random()*10),0,'185.220.101.99');  // hide it among the first 10, UNLABELLED
          echo('<span style="color:#7d8a7f">  NODE     ADDRESS             ROLE</span>');
          let rows='';
          ips.forEach((ip,i)=>{ const id='['+String(i+1).padStart(4,'0')+']';
            rows += `  ${id}   ${ip.padEnd(18)}transit\n`; });
          echo('<span style="color:#8fb89c;font-size:12px">'+rows.trimEnd()+'</span>');
          echo(`<span style="color:var(--amber)">${n} nodes reachable.</span>`);
          b.scrollTop=b.scrollHeight; break;
        }
        case 'clear': log.innerHTML=''; break;
        case 'continue': case 'boot': case 'exit':
          echo('<span style="color:#7d8a7f">resuming boot ...</span>');
          inp.disabled=true; await sleep(500);
          proceedToLogin(); resolve(); break;
        default: echo(`<span style="color:var(--amber)">${esc(c)}: command not found. try \`help\`.</span>`);
      }
      b.scrollTop=b.scrollHeight;
    });
  });
}

/* ---- reboot the OS in-app (re-run boot without reloading the page) ---- */
async function rebootOS(){
  if(W && !S.done){ if(!confirm('Reboot now? The current contract will be abandoned.')) return; }
  killIdiotVirus();   // a reboot is the only way out of the gag
  clearSelfTrace(); playerRelay=newRelay();   // fresh relay identity on reboot — shakes any self-trace
  const co=document.getElementById('caught-overlay'); if(co) co.remove();
  // tear down the running desktop session
  Object.keys(WIN).forEach(k=>delete WIN[k]);
  document.getElementById('windows').innerHTML='';
  document.getElementById('icons').innerHTML='';
  document.getElementById('tasklist').innerHTML='';
  document.getElementById('tb-status').textContent=''; delete document.getElementById('tb-status').dataset.contract;
  zTop=10; out=cmd=urlBar=pageEl=promptEl=traceEl=null;
  tabs=[{hist:[],hi:-1}]; activeTab=0;
  W=null; activeContract=null; resetState();
  await bootSequence();
}
let playerHandle=PROGRESS.handle||'operator';
// shared unlock animation → desktop (used by both first-time and returning logins)
async function enterDesktop(btn,steps){
  for(const s of (steps||['decrypting home volume','establishing relay circuit','spawning desktop'])){
    if(btn) btn.textContent=s+' …'; await sleep(300+Math.random()*220); }
  document.getElementById('login').classList.add('hidden');
  buildIcons(); openContracts();
  if(btn){ btn.disabled=false; btn.textContent='unlock relay'; }
}
async function login(){
  const btn=document.getElementById('login-btn'); if(btn.disabled) return;
  const inp=document.getElementById('login-user'), msg=document.getElementById('login-msg');
  const name=(inp.value||'').trim();
  const setMsg=(t,c)=>{ msg.textContent=t; msg.style.color=c||'var(--green-dim)'; };
  if(!name){ setMsg('enter a handle to route through the relay.','var(--amber)'); inp.focus(); return; }
  if(!/^[a-z0-9_]{2,16}$/i.test(name)){ setMsg('handles are 2–16 chars: letters, numbers, underscore.','var(--amber)'); return; }
  btn.disabled=true; setMsg('registering handle on the relay …');
  await sleep(650);
  // the handle must be unique on the relay. digits make a collision much less likely.
  const reject = Math.random() < (/\d/.test(name) ? 0.12 : 0.45);
  if(reject){ setMsg(`"${name}" already exists on the relay — pick a name that doesn't exist (adding numbers helps).`,'var(--red)'); btn.disabled=false; btn.textContent='unlock relay'; return; }
  // claimed: the relay now remembers this handle. you won't be asked again on this machine.
  playerHandle=name; PROGRESS.handle=name; saveProgress(); setMsg('handle accepted.','var(--green)');
  await enterDesktop(btn);
}
// returning user — the relay already knows this handle. skip the picker, just re-establish the circuit.
// returning user — the relay remembers the handle. offer CONTINUE (keep progress) or START OVER (wipe it).
// this is what stops an accidental refresh from costing you anything.
function returningLogin(){
  playerHandle=PROGRESS.handle;
  const login=document.getElementById('login');
  const inp=document.getElementById('login-user'); inp.style.display='none';
  document.querySelector('#login .uname').textContent='welcome back, '+PROGRESS.handle;
  const msg=document.getElementById('login-msg');
  msg.innerHTML=`balance <b style="color:var(--amber)">${fmtBtc(PROGRESS.balance)}</b> · ${PROGRESS.completed.length} contract(s) completed`;
  msg.style.color='var(--green-dim)';
  const btn=document.getElementById('login-btn'); btn.disabled=false; btn.textContent='continue';
  // a secondary "start over" control under the button
  let so=document.getElementById('startover-btn');
  if(!so){ so=document.createElement('div'); so.id='startover-btn';
    so.style.cssText='margin-top:2px;font-size:11px;color:var(--green-dim);cursor:pointer';
    btn.parentNode.appendChild(so); }
  so.textContent='start over (wipe balance, contracts & handle)';
  so.style.display='block';
  login.classList.remove('hidden');
  btn.onclick=()=>{ btn.disabled=true; so.style.display='none'; enterDesktop(btn,['re-establishing relay circuit','restoring session','spawning desktop']); };
  so.onclick=()=>{
    if(!confirm('Start over? This wipes your balance, completed contracts, and handle. This cannot be undone.')) return;
    PROGRESS.balance=0; PROGRESS.completed=[]; PROGRESS.handle=null; saveProgress(); updateWallet();
    so.style.display='none'; inp.style.display=''; inp.value='';
    document.querySelector('#login .uname').textContent='choose a relay handle';
    msg.textContent=''; btn.textContent='unlock relay'; btn.onclick=login; inp.focus();
  };
}

resetState();   // initialise S.* so free-roam browsing (services etc.) works before any contract
applySettings();
setWallpaper();
updateWallet();
document.getElementById('login-sub').textContent='// secure operating environment · v'+VERSION;
tickClock(); setInterval(tickClock,15000);
document.getElementById('login-btn').onclick=login;
document.getElementById('login-user').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
// global reboot combo — works even when something (e.g. the idiot-virus gag) has taken over the screen.
window.addEventListener('keydown',e=>{ if(e.ctrlKey&&e.altKey&&(e.key==='Delete'||e.key==='Backspace')){ e.preventDefault(); rebootOS(); } });
bootSequence();
</script>
