<style>
  :root{

  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#04060a;color:var(--green);font-family:var(--mono);font-size:13px}

  /* ---- desktop ---- */
  #desktop{position:fixed;inset:0;
    background:
      radial-gradient(1200px 700px at 70% -10%, #0b1a12, transparent),
      linear-gradient(160deg,#05080d,#0a0c10 60%,#070a08);

    background-image:linear-gradient(rgba(67,224,122,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(67,224,122,.025) 1px,transparent 1px);
    background-size:38px 38px}
  #icons{position:absolute;top:18px;left:18px;display:flex;flex-direction:column;gap:18px;z-index:1}
  .dicon{width:78px;text-align:center;color:#b9c6bd;cursor:pointer;user-select:none;font-family:var(--ui);font-size:11px}
  .dicon .gl{width:52px;height:52px;margin:0 auto 5px;border-radius:12px;background:#0e1510;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--green)}

  /* ---- windows ---- */
  #windows{position:absolute;inset:0;z-index:5;pointer-events:none}
  .win{position:absolute;pointer-events:auto;background:var(--panel);border:1px solid var(--border);border-radius:9px;box-shadow:0 16px 50px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;min-width:300px;min-height:180px}

  .win-title{display:flex;align-items:center;gap:8px;padding:7px 11px;background:#0e140e;cursor:move;user-select:none;border-bottom:1px solid var(--border)}
  .win-title .dot{width:13px;height:13px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;color:transparent;font-family:var(--ui)}

  .win-title .dot.close{background:#e0533f} .win-title .dot.min{background:#e0b343} .win-title .dot.max{background:#43e07a}
  .win-resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:3}
  .win-resize::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;border-right:2px solid var(--green-dim);border-bottom:2px solid var(--green-dim);opacity:.5}
  .loadbar{height:2px;width:0;background:#7d59c9;opacity:0;transition:width .25s linear,opacity .25s;box-shadow:0 0 6px #7d59c9}
  #wall{position:fixed;inset:0;z-index:0;pointer-events:none;background-repeat:no-repeat;background-position:center;background-size:cover;filter:grayscale(.55) contrast(1.05)}
  body.theme-amber{--green:#e8b13e;--green-dim:#9a7a2a;--link:#ffcf6b}
  body.theme-ice{--green:#56cfe1;--green-dim:#2f8a99;--link:#7fd4ff}
  .win-title .t{flex:1;color:#bdffd0;font-size:12px;font-family:var(--ui);letter-spacing:.4px}
  .win-title .st{color:var(--green-dim);font-size:11px;white-space:nowrap}
  .win-title .st.live{color:var(--red);animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.4}}
  .win-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative}

  /* ---- terminal app ---- */
  .term{background:var(--term-bg);display:flex;flex-direction:column;height:100%;position:relative}
  .term::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px);opacity:.5;z-index:0}
  body.no-scanlines .term::before{display:none}
  .out{flex:1;overflow-y:auto;padding:12px;white-space:pre-wrap;line-height:1.5;z-index:1}
  .inputline{display:flex;padding:8px 12px;border-top:1px solid var(--border);z-index:1;background:var(--term-bg)}
  .prompt{color:var(--green-dim);white-space:pre}
  .cmd{flex:1;background:transparent;border:none;color:var(--green);font-family:var(--mono);font-size:13px;outline:none}
  .c-dim{color:var(--green-dim)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
  .c-cyan{color:var(--cyan)} .c-white{color:#cfe} b{color:#bdffd0}

  .dossier{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;margin:0 0 12px;display:flex;gap:12px;white-space:normal}
  .dossier img{flex:none;width:84px;height:84px;object-fit:cover;border:1px solid var(--green-dim);border-radius:3px;background:#000;filter:grayscale(.3) contrast(1.05)}
  .dossier .meta{font-size:12px;line-height:1.55;min-width:0;overflow-wrap:anywhere}
  .dossier .meta>div{margin:1px 0} .dossier .meta .k{color:var(--green-dim)}

  /* ---- browser app ---- */
  .browser{background:var(--browser-bg);color:var(--browser-fg);display:flex;flex-direction:column;height:100%;overflow:hidden;font-family:var(--ui)}
  .tabstrip{display:flex;align-items:stretch;background:#0f1118;border-bottom:1px solid #262b38;padding:5px 5px 0;gap:3px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;max-width:170px;padding:5px 10px;background:#15171f;border:1px solid #262b38;border-bottom:none;border-radius:6px 6px 0 0;font-size:11px;color:#8c97a8;cursor:pointer;white-space:nowrap}
  .tab.active{background:var(--browser-bg);color:#cdd5e0}
  .tab .tl{overflow:hidden;text-overflow:ellipsis}
  .tab .tx{color:#6a7585;border-radius:3px;padding:0 4px;line-height:1}
  .tab .tx:hover{background:#2a3040;color:#cdd5e0}
  .tabadd{padding:4px 11px;color:#8c97a8;cursor:pointer;font-size:15px;align-self:center;border-radius:4px}
  .tabadd:hover{color:#cdd5e0;background:#181b24}
  .chrome{display:flex;align-items:center;gap:8px;padding:7px 9px;background:#181b24;border-bottom:1px solid #262b38}
  .navbtn{background:#0d0f15;border:1px solid #2a3040;color:#aeb8c6;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){background:#222838}
  .navbtn:disabled{opacity:.3;cursor:default}
  .addr{flex:1;display:flex;align-items:center;background:#0d0f15;border:1px solid #2a3040;border-radius:14px;padding:3px 10px;gap:6px}
  .addr .lock{color:#7d59c9}
  .addr input{flex:1;background:transparent;border:none;color:#aeb8c6;font-size:12px;outline:none;font-family:var(--mono)}
  .page{flex:1;overflow-y:auto;padding:20px 24px;line-height:1.65}
  .page h1{font-size:21px;margin:.2em 0} .page h2{font-size:15px;color:#8c97a8;margin:1.3em 0 .3em}
  .page p{margin:.7em 0}
  .page img.hero{width:100%;height:170px;object-fit:cover;border-radius:8px;margin:6px 0 14px;filter:contrast(1.05)}
  .page .nav{display:flex;flex-wrap:wrap;gap:16px;margin:12px 0 6px;border-bottom:1px solid #262b38;padding-bottom:10px}
  .page .nav a{color:#9fb0c4;font-size:13px}
  .page .team{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:12px 0}

  .page .tm .nm{color:#cfe;font-size:13px} .page .tm .rl{color:#8a94a2;font-size:11px;margin-top:2px}
  .page .brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .page .brand .bz{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#2f6f4a,#1a3a26);display:flex;align-items:center;justify-content:center;color:#bdffd0;font-weight:700;font-size:18px}
  .page .brand h1{font-size:19px}
  /* bright "clearnet" corporate skin — real-website look, distinct from the dark .onion pages */
  .page.skin-corp{background:#eef1f6;color:#1c2430}
  .page.skin-corp h1{color:#0f2238} .page.skin-corp h2{color:#56627a} .page.skin-corp p{color:#2a3340}
  .page.skin-corp .muted{color:#6b7686}
  .page.skin-corp a,.page.skin-corp .nav a{color:#1f6fd6}
  .page.skin-corp .nav{border-bottom:1px solid #d6dce6}
  .page.skin-corp .card{background:#ffffff;border:1px solid #d6dce6;color:#1c2430}
  .page.skin-corp .tm{background:#ffffff;border:1px solid #d6dce6}
  .page.skin-corp .tm .nm{color:#0f2238} .page.skin-corp .tm .rl{color:#6b7686}
  .page.skin-corp .tm img{filter:none}
  .page.skin-corp .pill{background:#e3e8f0;color:#3a4658}
  .page.skin-corp .post{border-left-color:#cfd6e2}
  .page.skin-corp b{color:#0f2238}
  .page.skin-corp .brand .bz{box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .page.skin-corp .frow label{color:#56627a}
  .page.skin-corp .frow input{background:#fff;border:1px solid #c4ccd8;color:#1c2430}
  .page.skin-corp .frow input:focus{border-color:#1f6fd6}
  .page.skin-corp .btn{background:#1f6fd6;border:1px solid #1f6fd6;color:#fff}
  .page.skin-corp .btn:hover{background:#1a5fbf}
  .page a{color:var(--link);cursor:pointer;text-decoration:none} .page a:hover{text-decoration:underline}
  .card{border:1px solid #262b38;border-radius:6px;padding:13px 15px;margin:11px 0;background:#151822}
  .muted{color:#7a8494} .pill{display:inline-block;background:#222838;border-radius:10px;padding:1px 9px;font-size:11px;color:#9fb0c4;margin-right:5px}
  .post{border-left:2px solid #2a3040;padding:5px 0 5px 12px;margin:11px 0}
  .searchbox{display:flex;gap:8px;margin:20px 0}
  .searchbox input{flex:1;background:#0d0f15;border:1px solid #2a3040;border-radius:16px;padding:9px 15px;color:#cdd5e0;font-size:13px;outline:none}
  .res{margin:15px 0} .res .u{color:#5fae6a;font-size:11px} .res .t{color:var(--link);font-size:15px} .res .d{color:#8a94a2;font-size:12px;margin-top:2px}
  .logo-tor{color:#7d59c9;font-weight:700;letter-spacing:1px}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6a7585;gap:14px}

  .page .btn{background:#1f6feb22;border:1px solid #2f81f7;color:#9fc7ff;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:13px;margin-top:6px;font-family:inherit}
  .page .btn:hover{background:#1f6feb33}
  .page .frow{display:flex;flex-direction:column;gap:3px;margin:9px 0}

  .page .frow input{background:#0d0f15;border:1px solid #2a3040;border-radius:5px;padding:7px 10px;color:#cdd5e0;font-size:13px;outline:none}

  /* ---- contracts app ---- */
  .board{height:100%;overflow-y:auto;padding:20px;font-family:var(--ui)}
  .board h1{font-size:22px;letter-spacing:4px;margin:4px 0 2px;color:var(--green);font-family:var(--mono)}
  .board .sub{color:var(--green-dim);margin-bottom:18px;font-size:12px}
  .contract{background:#0b110c;border:1px solid var(--border);border-radius:7px;padding:15px;margin-bottom:14px;cursor:pointer;transition:.15s;position:relative}
  .contract:hover{border-color:var(--green);transform:translateY(-1px)}
  .contract .cn{font-size:16px;color:#bdffd0;font-weight:700;font-family:var(--mono)}

  #clock{color:#9fb6a6;font-size:12px;font-family:var(--mono);min-width:54px;text-align:right}

  /* ---- boot & login ---- */
  #boot,#login{position:fixed;inset:0;z-index:100;background:#04060a;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #boot{font-family:var(--mono);color:var(--green-dim);align-items:flex-start;justify-content:flex-start;padding:40px;white-space:pre-wrap;font-size:13px;line-height:1.7}
  #login{gap:20px}
  #login .logo{font-size:40px;letter-spacing:10px;color:var(--green)}
  #login .sub{color:var(--green-dim);letter-spacing:2px;margin-top:-10px}
  #login .av{width:90px;height:90px;border-radius:50%;background:#0e1510;border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:38px;margin-top:14px}
  #login .uname{color:#cfe;letter-spacing:1px}
  #login button{background:#10180f;border:1px solid var(--green-dim);color:var(--green);border-radius:7px;padding:10px 28px;cursor:pointer;font-family:var(--mono);font-size:13px}
  #login button:hover{background:#16241400;box-shadow:0 0 18px rgba(67,224,122,.25);background:#13200f}
  .hidden{display:none!important}

  /* ---- CRT / 80s mode ---- */
  #crt{position:fixed;inset:0;z-index:300;pointer-events:none;display:none;
    background:linear-gradient(rgba(67,224,122,0), rgba(67,224,122,.05) 50%, rgba(67,224,122,0));
    background-size:100% 16px}
  body.crt #crt{display:block;animation:crtroll 7s linear infinite}
  @keyframes crtroll{0%{background-position:0 -120vh}100%{background-position:0 120vh}}
  body.crt #crt::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.20) 0 1px, rgba(0,0,0,0) 1px 3px)}
  body.crt #crt::after{content:"";position:absolute;inset:-3%;
    background:radial-gradient(ellipse 76% 72% at center, transparent 46%, rgba(0,0,0,.62) 100%)}
  body.crt #desktop{filter:saturate(1.22) brightness(1.04) blur(.25px)}
  body.crt{animation:crtflicker 6s infinite ease-in-out}
  @keyframes crtflicker{0%,100%{opacity:1}47%{opacity:.98}49%{opacity:.93}51%{opacity:.99}}

  ::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:#1d3a26;border-radius:4px}
  .browser ::-webkit-scrollbar-thumb,.page ::-webkit-scrollbar-thumb{background:#2a3040}
</style>
</head>

   ========================================================================== */
let zTop=10;
const WIN={};   // id -> {el, body, title, statusEl, visible}
function createWindow(id, title, {x=120,y=70,w=560,h=520}={}){
  if(WIN[id]) return WIN[id];
  const el=document.createElement('div'); el.className='win'; el.style.left=x+'px'; el.style.top=y+'px';
  el.style.width=w+'px'; el.style.height=h+'px';
  el.innerHTML=`<div class="win-title">
      <span class="dot close" data-act="close">✕</span>
      <span class="dot min" data-act="min">–</span>
      <span class="dot max" data-act="max">+</span>
      <span class="t">${title}</span><span class="st"></span>
    </div><div class="win-body"></div><div class="win-resize"></div>`;
  document.getElementById('windows').appendChild(el);
  const rec={el, body:el.querySelector('.win-body'), statusEl:el.querySelector('.st'), title, visible:true, closed:false, id};
  WIN[id]=rec;
  const bar=el.querySelector('.win-title');
  bar.addEventListener('mousedown',e=>{
    const act=e.target.dataset.act;
    if(act){ e.stopPropagation(); if(act==='close')closeWindow(id); else if(act==='min')minimizeWindow(id); else maximizeWindow(id); return; }
    focusWindow(id);
    if(rec._max) return;
    const r=el.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
    const mv=ev=>{ el.style.left=Math.max(0,ev.clientX-ox)+'px'; el.style.top=Math.max(0,ev.clientY-oy)+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  bar.addEventListener('dblclick',e=>{ if(!e.target.dataset.act) maximizeWindow(id); });
  const rz=el.querySelector('.win-resize');
  rz.addEventListener('mousedown',e=>{ e.stopPropagation(); focusWindow(id);
    const sx=e.clientX, sy=e.clientY, sw=el.offsetWidth, sh=el.offsetHeight;
    const mv=ev=>{ el.style.width=Math.max(300,sw+ev.clientX-sx)+'px'; el.style.height=Math.max(180,sh+ev.clientY-sy)+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  el.addEventListener('mousedown',()=>focusWindow(id));
  focusWindow(id);
  return rec;
}
function focusWindow(id){
  const r=WIN[id]; if(!r) return;
  r.visible=true; r.closed=false; r.el.style.display='flex'; r.el.style.zIndex=++zTop;
  Object.values(WIN).forEach(w=>w.el.classList.toggle('focused', w===r));
  renderTaskbar();
}
function minimizeWindow(id){ const r=WIN[id]; if(!r)return; r.visible=false; r.el.style.display='none'; renderTaskbar(); }
function closeWindow(id){ const r=WIN[id]; if(!r)return; r.visible=false; r.closed=true; r.el.style.display='none'; renderTaskbar(); }
function maximizeWindow(id){
  const r=WIN[id]; if(!r)return; const el=r.el;
  if(r._max){ Object.assign(el.style, r._prev); r._max=false; }
  else { r._prev={left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
    el.style.left='0px'; el.style.top='0px'; el.style.width='100vw'; el.style.height=(window.innerHeight-42)+'px'; r._max=true; }
  focusWindow(id);
}
function toggleWindow(id){ const r=WIN[id]; if(!r)return;
  if(!r.visible){ focusWindow(id); return; }
  if(r.el.style.zIndex==zTop) minimizeWindow(id); else focusWindow(id); }
function renderTaskbar(){
  const tl=document.getElementById('tasklist');
  const list=Object.values(WIN).filter(w=>!w.closed);
  tl.innerHTML=list.map(w=>
    `<div class="taskbtn ${(w.visible&&w.el.style.zIndex==zTop)?'active':''} ${!w.visible?'min':''}" data-id="${w.id}">${escapeHtml(w.title)}</div>`).join('');
  tl.querySelectorAll('.taskbtn').forEach(b=>b.onclick=()=>toggleWindow(b.dataset.id));
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  fwdBtn.onclick=()=>{ const t=T(); if(t.hi<t.hist.length-1){ t.hi++; renderInstant(t.hist[t.hi]); } };

/* ============================================================================

let backBtn,fwdBtn, tabs=[{hist:[],hi:-1}], activeTab=0, loadGen=0;
function T(){ return tabs[activeTab]; }
function currentEntry(){ const t=T(); return t.hi>=0?t.hist[t.hi]:null; }
function resetBrowser(){ tabs=[{hist:[],hi:-1}]; activeTab=0; }
function navigate(url,q){ url=(url||'').trim(); if(!url) url=WEB_START; go({url,q}); }
function goHome(){ navigate(WEB_START); }
function go(entry){ const t=T(); t.hist=t.hist.slice(0,t.hi+1); t.hist.push(entry); t.hi=t.hist.length-1; renderTabs(); loadAndRender(entry); }
async function loadAndRender(entry){
  const g=++loadGen; if(urlBar) urlBar.value=entry.url;
  const site=siteMap()[entry.url];
  if(SETTINGS.loaddelay && site){                 // delay ALL loads, search included
    const d=800+Math.random()*2000;               // longer — like bad Tor routing
    showLoading(entry.url); startLoadbar(d);
    await sleep(d);
    if(g!==loadGen) return;                        // a newer load owns the bar now — bail
  }
  render(entry);   // render() always finishes the bar
}
function renderInstant(entry){ loadGen++; render(entry); }   // back/fwd: cached, no delay
function showLoading(url){
  const hops=['guard','middle','exit'];
  pageEl.className='page';
  pageEl.innerHTML=`<div class="loading"><div class="spinner"></div>
    <div>establishing circuit to<br><span class="muted">${esc(url)}</span></div>
    <div class="muted" style="font-size:11px">routing through ${hops.map(h=>h).join(' → ')} relays…</div></div>`;
}
let loadbarTimer=null;
function startLoadbar(d){ const lb=WIN.browser&&WIN.browser._loadbar; if(!lb)return;
  clearTimeout(loadbarTimer);
  lb.style.transition='none'; lb.style.width='0%'; lb.style.opacity='1'; lb.offsetWidth;
  lb.style.transition=`width ${d}ms cubic-bezier(.1,.7,.25,1)`; lb.style.width='90%'; }
// only acts if the bar is actually showing — so it's a safe no-op on instant navigations
function finishLoadbar(){ const lb=WIN.browser&&WIN.browser._loadbar; if(!lb||lb.style.opacity!=='1')return;
  clearTimeout(loadbarTimer);
  lb.style.transition='width .12s ease-out, opacity .3s'; lb.style.width='100%';
  loadbarTimer=setTimeout(()=>{ lb.style.opacity='0'; lb.style.width='0%'; },160); }
function render(entry){
  finishLoadbar();
  if(!entry){ pageEl.innerHTML=''; if(urlBar)urlBar.value=''; updateNav(); return; }
  if(urlBar) urlBar.value=entry.url;
  let site=siteMap()[entry.url];
  if(!site) site=proceduralSite(entry.url);   // make the web feel boundless — unknown domains resolve to filler
  // skin: clearnet (.com) sites render as bright real websites; .onion stays dark deep-web
  let skin = site && site.skin;
  if(!skin && /\.com(\/|$|\?)/.test(entry.url)) skin='corp';
  pageEl.className='page'+(skin?' skin-'+skin:'');
  if(!site){ pageEl.innerHTML=`<h1 style="color:#e0533f">Unable to connect</h1><p class="muted">No relay route to <b>${esc(entry.url)}</b>.</p>`; updateNav(); renderTabs(); return; }
  if(site.discover && W) site.discover.forEach(discover);
  if(site.type==="search") renderSearch(entry.q);
  else if(site.type==="service") renderService(entry.url);
  else pageEl.innerHTML=site.html;
  updateNav(); renderTabs();
}
/* Procedural filler: any unknown domain-ish URL resolves to a plausible page (deterministic from

function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

  if(/^tor:/.test(url) || !/[a-z0-9-]+\.[a-z]{2,}/i.test(url)) return null;

      const hobby=pick(['dragons','my cats','classic cars','astronomy','poetry','my band','aquariums','UFOs']);

        <h1 style="color:#ffff00;text-shadow:2px 2px #ff00ff;margin:.2em">~*~ ${esc(who)}'s Homepage ~*~</h1>
        <marquee style="color:#00ffff;font-size:15px">·•· welcome 2 my little corner of the WORLD WIDE WEB ·•·</marquee>

        <p style="color:#ccc;font-size:12px">You are visitor number <b>0000${h%9000+1000}</b> · © ${1996+(h%9)}</p></div>` }; }
    case 9: return { skin:'retro', html:`<div style="background:#0a0a0a;color:#caffca;font-family:monospace;padding:16px;border:1px solid #2a8a4d">
        <h1 style="color:#43e07a">THE TRUTH ABOUT ${esc(host.toUpperCase())}</h1>

    case 10: case 11: return { html:`<h1>${esc(host)}</h1><div class="muted">members only · est. ${2001+h%18}</div>
        <div class="card"><div class="frow"><label>username</label><input></div>

    case 12: return { html:`<h1>${esc(host)} forum</h1><div class="muted">archived · read-only · last post ${2009+h%10}</div>

    default: return { html:`<h1 style="color:#e0533f">503</h1><p class="muted">${esc(host)} is temporarily unavailable. The service may have moved or been seized.</p>` };

function updateNav(){ const t=T(); if(backBtn){ backBtn.disabled=t.hi<=0; fwdBtn.disabled=t.hi>=t.hist.length-1; } }
function tabLabel(t){
  const e=t.hi>=0?t.hist[t.hi]:null; if(!e) return 'New Tab';
  const site=siteMap()[e.url];
  if(site&&site.type==='search') return e.q?('“'+e.q+'”'):'TORCH';
  if(site&&site.title) return site.title.split('—')[0].trim()||e.url;
  return e.url.replace(/^\w+:\/\//,'');

function renderTabs(){
  const strip=WIN.browser&&WIN.browser._tabstrip; if(!strip) return;
  strip.innerHTML=tabs.map((t,i)=>`<div class="tab ${i===activeTab?'active':''}" data-i="${i}">
      <span class="tl">${esc(tabLabel(t))}</span>${tabs.length>1?`<span class="tx" data-close="${i}">×</span>`:''}</div>`).join('')

/* ---- filesystem helpers ---- */
function normPath(pth){ const st=[]; for(const seg of pth.split('/')){ if(!seg||seg==='.')continue; if(seg==='..')st.pop(); else st.push(seg);} return '/'+st.join('/'); }
function resolvePath(cwd,arg){ if(!arg) return cwd; return arg.startsWith('/')?normPath(arg):normPath(cwd+'/'+arg); }
function isDir(files,dir){ if(dir==='/'||dir==='') return true; return Object.keys(files).some(k=>k.startsWith(dir+'/')); }
function listDir(files,dir){
  const base=dir==='/'?'':dir, dirs=new Set(), fs=[];
  for(const k of Object.keys(files)){
    if(base===''||k.startsWith(base+'/')){ const rest=k.slice(base.length).replace(/^\//,''); const seg=rest.split('/')[0]; if(!seg)continue;
      if(rest.includes('/')) dirs.add(seg); else fs.push(seg); }
  }
  return {dirs:[...dirs].sort(), files:fs.sort()};
}

    if(parts[0]==='add'){ const words=parts.slice(1); if(!words.length){ line("usage: wordlist add <word ...>","c-dim"); return; }

    if(arg!=="--gen"){ line("usage: wordlist --gen  |  wordlist add <word ...>","c-dim"); return; }
    let facts;
    if(SETTINGS.autoIntel){ facts=[...S.discovered].map(k=>W.facts[k]).filter(f=>f.type==='cred').map(f=>f.value);
      if(!facts.length){ line("no password clues yet — those come from personal life, not the network.","c-amber"); return; } }
    else { facts=[...new Set(S.seeds)]; if(!facts.length){ line("no seeds — read the pages, then `wordlist add <word>`.","c-amber"); return; } }
    const list=new Set(); const caps=s=>s.charAt(0).toUpperCase()+s.slice(1);
    for(const a of facts){ list.add(a); list.add(caps(a));
      for(const b of facts){ if(a!==b){ list.add(caps(a)+b); list.add(a+b); list.add(caps(a)+"!"); } } }
    S.wordlist=[...list];
    line(`generated ${S.wordlist.length} candidates from ${facts.length} clues:`,'c-dim');
    p(`  <span class="c-dim">${esc(S.wordlist.slice(0,12).join('  '))} ...</span>`);
  },
  crack(arg){
    if(!arg||!arg.includes('@')){ line("usage: crack <user>@<ip>   (loud brute-force — IDS hosts will flag it)","c-dim"); return; }
    const [user,ip]=arg.split('@'); const m=W.machines.find(x=>x.ip===ip);
    if(!m){ line(`no host at ${ip}.`,'c-amber'); return; }
    if(S.cracked.has(`${user}@${ip}`)){ line(`already have creds for that account. connect ${ip}`,'c-dim'); return; }
    if(!S.wordlist){ line("no wordlist loaded. run `wordlist --gen` first.","c-amber"); return; }
    return crackAnim(m,user,ip);
  },
  async login(arg){
    const parts=(arg||'').split(/\s+/); const target=parts[0]||''; const pw=parts.slice(1).join(' ');
    if(!target.includes('@')||!pw){ line("usage: login <user>@<ip> <password>   (silent — no brute force, no trace)","c-dim"); return; }
    const [user,ip]=target.split('@'); const m=W.machines.find(x=>x.ip===ip);
    if(!m){ line(`no host at ${ip}.`,'c-amber'); return; }
    await typeLine(`authenticating ${user}@${ip} ...`,'c-dim',6);
    if(user===m.account.user && pw===m.account.password){
      S.cracked.add(`${user}@${ip}`);                 // quiet: NOT added to S.loud
      line("  ✔ accepted. clean login — no noise, no alarms.","c-cyan");
      line(`  now: connect ${ip}`,'c-dim');
    } else line("  ✖ authentication failed.","c-amber");
  },
  async connect(arg){
    const m=W.machines.find(x=>x.ip===arg);
    if(!m){ line("usage: connect <ip>  (no such host)","c-amber"); return; }
    if(!S.knownSubnets.has(m.subnet)){ line("no route to that host — its subnet isn't reachable from here.","c-red"); return; }
    const key=`${m.account.user}@${arg}`;
    if(!S.cracked.has(key)){ line("access denied — no valid credentials. `crack` or `login` first.","c-red"); return; }
    if(S.traceTimer) stopTrace();
    S.conn=arg; S.cwd=m.home||"/"; updatePrompt();
    await typeLine(`opening session to ${m.hostname} (${arg}) ...`,'c-dim',5);
    const loud=S.loud.has(key);
    if(m.ids && SETTINGS.trace && loud){ line("session live. ⚠ you forced your way in — the IDS is tracing you. MOVE.","c-red"); startTrace(m.trace_seconds||60); }
    else if(m.ids && loud){ line("session live. (IDS present, but trace is disabled in settings.)","c-dim"); }
    else if(m.ids){ line("session live. you logged in with valid credentials — the IDS sees a normal session. take your time.","c-cyan"); }
    else line("session live. no IDS detected — take your time here.","c-dim");
    if(m.reveals_subnet && !S.knownSubnets.has(m.reveals_subnet)){ S.knownSubnets.add(m.reveals_subnet);
      line(`  internal route discovered: ${m.reveals_subnet} — re-run \`scan\`.`,'c-cyan'); }
  },
  pwd(){ line(S.cwd||"/","c-white"); },
  cd(arg){ const m=activeHost();
    if(!m.hidden_fs){ line("cd: this host has a flat view — just `ls` and `cat`.","c-dim"); return; }
    const t=resolvePath(S.cwd,arg||m.home||"/");
    if(isDir(m.files,t)){ S.cwd=t; line(t,'c-dim'); } else line(`cd: ${arg}: no such directory`,'c-amber'); },
  ls(arg){ const m=activeHost();
    if(!m.hidden_fs){ Object.keys(m.files).forEach(f=>{ const tgt=f===W.mission.target_artifact;
      p(`  <span class="${tgt?'c-red':'c-white'}">${esc(f)}</span>${tgt?' <span class="c-red">← target</span>':''}`); }); return; }
    const dir=resolvePath(S.cwd,arg||'');
    if(!isDir(m.files,dir)){ line(`ls: ${arg}: no such directory`,'c-amber'); return; }
    const {dirs,files}=listDir(m.files,dir);
    if(!dirs.length&&!files.length){ line("(empty)","c-dim"); return; }
    dirs.forEach(d=>p(`  <span class="c-cyan">${esc(d)}/</span>`)); files.forEach(f=>p(`  <span class="c-white">${esc(f)}</span>`)); },
  cat(arg){ const m=activeHost(); if(!arg){ line("usage: cat <path>","c-dim"); return; }
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`cat: ${arg}: no such file`,'c-amber'); return; }
    line(m.files[path]||'(empty file)', m.files[path]?'c-white':'c-dim');
    const drop=(W.cred_drops||[]).find(d=>d.path===path);
    if(drop && !S.cracked.has(`${drop.user}@${drop.ip}`)){
      S.foundCreds[`${drop.user}@${drop.ip}`]=drop.password; S.cracked.add(`${drop.user}@${drop.ip}`);
      line(`  ► credentials acquired: ${drop.user}@${drop.ip}  (${drop.note||''})`,'c-cyan');
      line(`  you can now: connect ${drop.ip}`,'c-dim'); } },
  async exfil(arg){ const m=conn(); if(!m)return; if(!arg){ line("usage: exfil <path>","c-dim"); return; }
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`exfil: ${arg}: no such file`,'c-amber'); return; }
    const base=path.split('/').pop();
    await typeLine(`exfiltrating ${path}  →  ~/loot/${base}`,'c-cyan',3);
    for(let i=0;i<=100;i+=25){ await sleep(140); line(`  [${'█'.repeat(i/10)}${'░'.repeat(10-i/10)}] ${i}%`,'c-dim'); }
    HOME.files['/root/loot/'+base]=m.files[path]; refreshFilesApp();
    line(`  copied to ~/loot/${base} on your box.`,'c-cyan');
    if(path===W.mission.target_artifact){
      if(W.mission.objective_type==='exfil'){ S.objComplete=true; line("► objective file secured. `disconnect` to finish.","c-amber"); }
      else if(W.mission.objective_type==='leak'){ S.exfilDone=true; line(`► got it. now \`disconnect\`, then \`upload ${W.mission.leak_dest}\`.`,"c-amber"); } } },
  async upload(arg){
    if(W.mission.objective_type!=='leak'){ line("upload: this contract isn't a leak job.","c-dim"); return; }
    if(!S.exfilDone){ line("nothing staged. `exfil` the target file first.","c-amber"); return; }
    if(!arg){ line(`usage: upload ${W.mission.leak_dest||'<drop>'}`,"c-dim"); return; }
    if(arg!==W.mission.leak_dest){ line(`upload: ${arg}: not the drop the client specified.`,"c-amber"); return; }
    if(S.conn){ line("upload from your own box — `disconnect` first.","c-amber"); return; }
    await typeLine(`uploading ~/loot  →  ${arg} ...`,'c-cyan',3); await sleep(500);
    line("  published. it's out there now — can't be un-leaked.","c-cyan");
    S.objComplete=true; completeContract(); },
  async shred(arg){ const m=conn(); if(!m)return;
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`shred: ${arg}: no such file`,'c-amber'); return; }
    if(path!==W.mission.target_artifact){ line(`shred: refusing — ${arg} is not the contract target.`,'c-amber'); return; }
    await typeLine(`shredding ${path}`,'c-red',3);
    for(let i=0;i<=100;i+=20){ await sleep(160); line(`  overwriting pass ${i/20+1}/6  [${'█'.repeat(i/10)}${'░'.repeat(10-i/10)}]`,'c-dim'); }
    delete m.files[path];
    if(W.mission.objective_type==='shred'){ S.objComplete=true;
      line("  target destroyed. no recoverable copy.","c-red");
      line("► objective complete. now `disconnect` before the trace locks!","c-amber"); }
    else { line("  the file is gone — shredded to nothing.","c-red");
      failContract(`the client wanted that file ${W.mission.objective_type==='leak'?'leaked':'stolen'}, not destroyed — you burned the asset`); } },
  note(arg){ const f='/root/notes.txt';
    if(!arg){ const c=HOME.files[f]; line(c||'(notes empty — `note add <text>`)', c?'c-white':'c-dim'); return; }
    if(arg==='clear'){ HOME.files[f]=''; refreshNotesApp(); line("notes cleared.","c-dim"); return; }
    if(arg.startsWith('add ')){ const t=arg.slice(4).trim(); if(!t){ line("usage: note add <text>","c-dim"); return; }
      HOME.files[f]=(HOME.files[f]?HOME.files[f]+'\n':'')+'• '+t; refreshNotesApp(); line("noted.","c-dim"); return; }
    line("usage: note  |  note add <text>  |  note clear","c-dim"); },
  disconnect(){ if(!S.conn){ line("not connected.","c-dim"); return; }
    S.conn=null; stopTrace(); S.cwd=HOME.home; updatePrompt();
    line("session dropped. relay scrubbed.","c-dim");
    if(S.objComplete && !S.done) win();
    else if(S.exfilDone && W.mission.objective_type==='leak') line(`loot is in ~/loot. now \`upload ${W.mission.leak_dest}\` to finish.`,"c-amber");
    else line("...but the job isn't done yet.","c-amber"); },
  whoami(){ line(S.conn?(activeHost().account?activeHost().account.user:'user'):'root','c-white'); },
  uname(){ line("BlackoutOS 2.1 (relay-hardened linux) x86_64","c-white"); },
  date(){ line(new Date().toString(),'c-white'); },
  echo(arg){ line(arg||'','c-white'); },
  mkdir(arg){ const m=activeHost(); if(!arg){ line("usage: mkdir <dir>","c-dim"); return; }
    if(!m.hidden_fs){ line("mkdir: not supported on this host","c-dim"); return; }
    m.files[resolvePath(S.cwd,arg)+'/.keep']=''; if(m.local) refreshFilesApp(); },
  touch(arg){ const m=activeHost(); if(!arg){ line("usage: touch <file>","c-dim"); return; }
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg; if(!(path in m.files)) m.files[path]=''; if(m.local) refreshFilesApp(); },
  async rm(arg){ const m=activeHost(); if(!arg){ line("usage: rm [-rf] <path>","c-dim"); return; }
    let recursive=false, t=arg; const fm=arg.match(/^-(\w+)\s+(.*)$/); if(fm){ recursive=/r/.test(fm[1]); t=fm[2]; }
    const path=m.hidden_fs?resolvePath(S.cwd,t):t;
    if(recursive && (path==='/'||path==='/root'||path==='') && m.local){ return systemWipe(); }
    if(recursive){ const keys=Object.keys(m.files).filter(k=>k===path||k.startsWith(path+'/'));
      if(!keys.length){ line(`rm: ${t}: no such file or directory`,'c-amber'); return; }
      keys.forEach(k=>delete m.files[k]); line(`removed ${keys.length} item(s).`,'c-dim'); }
    else { if(!(path in m.files)){ line(`rm: ${t}: no such file`,'c-amber'); return; } delete m.files[path]; }
    if(m.local) refreshFilesApp(); },
  clear(){ out.innerHTML=''; }
};
function completeContract(){ if(S.objComplete && !S.done) win(); }
function failContract(reason){
  if(S.done) return; S.done=true; stopTrace(); if(S.conn){ S.conn=null; updatePrompt(); }
  line(""); line("════════════════════════════════════════════","c-red");
  line(" ✖ CONTRACT FAILED — "+(reason||'objective blown')+".","c-red");
  line("════════════════════════════════════════════","c-red");
  line("Open Contracts (taskbar ▣) to take another job.","c-dim"); lockInput();
}
async function systemWipe(){
  lockInput(); out.innerHTML='';
  const steps=["rm: recursively descending into /","removing /home ...","removing /etc ...","removing /boot ...",
    "removing /dev/relay0 ...","removing /bin /sbin /usr ...","sync ...","there is nothing left to remove."];
  for(const s of steps){ await typeLine(s,'c-red',6); await sleep(220); }
  await sleep(700);
  const panic=document.createElement('div');
  panic.style.cssText='position:fixed;inset:0;z-index:999;background:#000;color:#e0533f;font-family:monospace;font-size:13px;padding:42px;white-space:pre-wrap;line-height:1.7';
  panic.textContent="BLACKOUT — RELAY FAULT\n\n  unable to connect to relay.\n  machine architecture missing: /dev/relay0 not found.\n  the operating system is gone. you did this.\n\n  [ refresh to reinstall BLACKOUT OS ]";
  document.body.appendChild(panic);
}

const RAND_CHARS='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
function fakePw(){ const n=6+Math.floor(Math.random()*7); let s=''; for(let i=0;i<n;i++) s+=RAND_CHARS[Math.floor(Math.random()*RAND_CHARS.length)]; return s; }
async function crackAnim(m,user,ip){
  if(user!==m.account.user){ line(`host ${m.hostname} has no local user '${user}'.`,'c-amber');
    line(`(that may be the machine name — try the login handle from recon.)`,'c-dim'); return; }
  const hit=S.wordlist.includes(m.account.password);
  await typeLine(`brute-forcing ${user}@${ip} — ⚠ this is LOUD, the host will notice`,'c-red',4);
  // simulate a real brute force: a counter into the hundreds + rolling candidate strings
  const N = hit ? 120+Math.floor(Math.random()*420) : 760+Math.floor(Math.random()*500);
  const d=document.createElement('div'); d.className='c-dim'; out.appendChild(d);
  let i=0; const step=Math.max(1,Math.round(N/45));
  while(i<N){ i=Math.min(N,i+step); d.textContent=`  [${String(i).padStart(4)}/${N}] trying  ${fakePw()}`; out.scrollTop=out.scrollHeight; await sleep(34); }
  if(hit){
    d.textContent=`  [${N}/${N}] ✔ MATCH`;
    S.cracked.add(`${user}@${ip}`); S.loud.add(`${user}@${ip}`);
    line(`  credentials recovered → ${user}:${m.account.password}`,'c-cyan');
    line(`  ⚠ that hammering was noisy. on an IDS host this session will be TRACED.`,'c-amber');
    line(`  (skilled play: work the password out yourself, then \`login ${user}@${ip} <password>\` — silent, no trace.)`,'c-dim');
    line(`  now: connect ${ip}`,'c-dim');
  } else {
    d.textContent=`  exhausted ${N} candidates — no match.`;
    line(`  password isn't in your wordlist. gather more clues, or derive it and \`login\`.`,'c-amber');
  }
}
function win(){ S.done=true; stopTrace();
  line(""); line("════════════════════════════════════════════","c-cyan");
  line(" CONTRACT COMPLETE — clean exit, no trace.","c-cyan");
  line(` ${W.mission.target_name} will never know it was here.`,"c-cyan");
  line("════════════════════════════════════════════","c-cyan");
  line("Open Contracts (taskbar ▣) for the next job.","c-dim"); lockInput();
}

/* ---- terminal input ---- */
let cmdHist=[], histPtr=0;
function wireInput(){
  cmd.addEventListener('keydown',async e=>{
    if(e.key==='ArrowUp'){ e.preventDefault(); if(cmdHist.length){ histPtr=Math.max(0,histPtr-1); cmd.value=cmdHist[histPtr]||'';
      setTimeout(()=>cmd.setSelectionRange(cmd.value.length,cmd.value.length),0);} return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); if(cmdHist.length){ histPtr=Math.min(cmdHist.length,histPtr+1); cmd.value=cmdHist[histPtr]||'';} return; }
    if(e.key!=='Enter') return;
    const raw=cmd.value.trim(); cmd.value=''; if(!raw) return;
    cmdHist.push(raw); histPtr=cmdHist.length;
    line(`root@${S.conn?activeHost().hostname:'localhost'}:~$ ${raw}`,'c-dim');
    const [name,...rest]=raw.split(/\s+/); const fn=CMD[name];
    if(!fn){ line(`${name}: command not found. try \`help\`.`,'c-amber'); return; }
    try{ await fn(rest.join(' ')); }catch(err){ line("internal error: "+err.message,'c-red'); }
  });
}

function openContracts(){

  rec.body.innerHTML=`<div class="board"><h1>BLACKOUT</h1><div class="sub">// contract board · select a job</div>

  const list=rec.body.querySelector('.clist');
  list.innerHTML=CONTRACTS.map(c=>`<div class="contract" data-id="${c.id}">
      <div class="payout">${c.payout}</div><div class="cn">${esc(c.name)}</div>
      <div class="diff diff-${c.difficulty}">● ${c.difficulty} RISK</div>
      <div class="desc">${esc(c.desc)}</div>
      <div class="tags">${c.tags.map(t=>`<span class="ctag">${esc(t)}</span>`).join('')}</div></div>`).join('');
  list.querySelectorAll('.contract').forEach(el=>el.onclick=()=>startContract(el.dataset.id));
  focusWindow('contracts');
}
function startContract(id){
  const c=CONTRACTS.find(x=>x.id===id); if(!c)return;
  if(W && !S.done){ if(!confirm('Abandon the current contract and start "'+c.name+'"? Your progress is lost.')) return; }
  runGen++; W=(window.structuredClone?structuredClone(c.world):JSON.parse(JSON.stringify(c.world))); resetState();
  W.mission.faceId=Math.floor(Math.random()*100);
  W.machines.forEach(m=>{ if(m.exposed) S.knownSubnets.add(m.subnet); });
  buildTerminal(); buildBrowser();
  out.innerHTML=''; cmd.disabled=false; cmd.placeholder='';
  resetBrowser(); navigate(WEB_START); updatePrompt();
  document.getElementById('tb-status').dataset.contract=c.name;
  if(WIN.terminal) WIN.terminal.title='● TERMINAL — '+c.name;
  closeWindow('contracts'); focusWindow('terminal'); renderTaskbar();
  boot(c);
}
async function boot(c){
  const g=runGen;
  await typeLine(`BLACKOUT secure relay · contract "${c.name}" accepted`,"c-dim",5);
  await typeLine("decrypting dossier ...","c-dim",5); await sleep(200);
  if(g!==runGen) return; renderDossier();
  for(const l of W.mission.briefing){ if(g!==runGen) return; await typeLine("  "+l,"c-amber",3); }
  if(g!==runGen) return;
  line(""); line("Type `help` for commands. Recon starts in the Tor Browser →","c-dim"); line("");
  paintTBStatus();
}

    <p>This is where you access machines and run the job. Type <b>help</b> for the command list, <b>help 2</b>

    <p><b>scan</b> — find live hosts on subnets you know.<br>
    <b>ls / cd / cat</b> — look around a filesystem (your own box when not connected).<br>
    <b>note add &lt;text&gt;</b> — jot intel to your notes.</p>
    <p class="muted">When you're not connected, you're on <b>localhost</b> — your own machine.</p>`},
  {t:"Recon → Access", h:`<h2>Cracking — loud vs. silent</h2>
    <p>You get into an account two ways:</p>
    <p><b>① Brute-force (loud).</b> Gather clues, build a list with <b>wordlist --gen</b>, then
    <b>crack &lt;user&gt;@&lt;ip&gt;</b>. It hammers the login with hundreds of guesses. It works — but it's
    <span style="color:#e0533f">noisy</span>. On a host with an <b>IDS</b>, a brute-forced session gets
    <b>traced</b> and you're on the clock.</p>
    <p><b>② Figure out the password yourself (silent).</b> If recon tells you it's "the dog's name + the year",
    you can just <b>login &lt;user&gt;@&lt;ip&gt; Biscuit1971</b>. A correct password is a <span style="color:#43e07a">clean
    login</span> — even an IDS sees a normal session. <b>No trace.</b></p>
    <p class="muted">The skilled play is to read carefully, derive the exact password, and walk in silently.
    Brute force is the fallback when you can't.</p>`},
  {t:"Objectives", h:`<h2>Doing the job</h2>
    <p>The objective verb matters — using the wrong one fails the contract:</p>
    <p><b>shred &lt;path&gt;</b> — destroy a file permanently.<br>
    <b>exfil &lt;path&gt;</b> — copy a file to your <b>~/loot</b>.<br>
    <b>upload &lt;drop&gt;</b> — publish what you've exfil'd to a leak drop (leak jobs).</p>
    <p style="color:#e0b343">If the job is to STEAL or LEAK a file, shredding it destroys the asset and
    FAILS you. Read the order.</p>
    <p>Once the objective's done, <b>disconnect</b> to finish — before any trace locks you out.</p>`},
  {t:"Your Device", h:`<h2>localhost — your rig</h2>
    <p>When you're not connected to a target, the terminal is on your own machine. It persists across jobs:</p>
    <p><b>~/loot</b> — exfil'd files land here (also in the <b>Files</b> app).<br>
    <b>~/notes.txt</b> — your notes (also the <b>Notes</b> app).<br>
    <b>~/wordlists</b>, <b>~/tools</b> — gear.</p>
    <p class="muted">It's a real-ish shell — whoami, uname, mkdir, touch, rm all work. Be careful with rm -rf.</p>`},
  {t:"Effects & Tips", h:`<h2>Settings &amp; effects</h2>
    <p><b>Settings</b> lets you toggle the trace timer, auto-intel (hard mode: read pages yourself),
    typewriter text, page-load delays, the colour scheme, and full <b>CRT / 80s mode</b>.</p>
    <h2>Tips</h2>
    <p>· Read the whole page — the clue is rarely the obvious bit.<br>
    · Keep notes; targets reuse details across sites.<br>
    · Derive the password and <b>login</b> to stay invisible on guarded systems.<br>
    · The deep web is bigger than the contract — explore it.</p>`}
];
function openManual(){
  const rec=createWindow('manual','● MANUAL',{x:170,y:60,w:620,h:520});
  rec.body.innerHTML=`<div style="display:flex;height:100%;font-family:var(--ui)">
    <div class="man-nav" style="width:150px;flex:none;border-right:1px solid var(--border);overflow-y:auto;background:#0b110c"></div>
    <div class="man-body" style="flex:1;overflow-y:auto;padding:16px 20px;line-height:1.6;color:#c8d0d8"></div></div>`;
  const nav=rec.body.querySelector('.man-nav'), body=rec.body.querySelector('.man-body');
  const show=i=>{ body.innerHTML=MANUAL[i].h; nav.querySelectorAll('.mi').forEach((e,j)=>e.style.background=j===i?'#13200f':'');
    body.scrollTop=0; };
  nav.innerHTML=MANUAL.map((s,i)=>`<div class="mi" data-i="${i}" style="padding:9px 12px;cursor:pointer;color:#9fb6a6;font-size:12px;border-bottom:1px solid var(--border)">${esc(s.t)}</div>`).join('');
  nav.querySelectorAll('.mi').forEach(e=>e.onclick=()=>show(+e.dataset.i));
  show(0); focusWindow('manual');
}

/* ---- settings window ---- */
function openSettings(){
  const rec=createWindow('settings','● SETTINGS',{x:260,y:90,w:460,h:430});
  const render=()=>{
    rec.body.innerHTML=`<div style="padding:18px;overflow-y:auto;height:100%">`+
      SETTINGS_DEFS.map(d=>`<div style="display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--border)">
        <div style="flex:1"><div style="color:#cfe;font-size:13px">${esc(d.label)}</div>
        <div style="color:var(--green-dim);font-size:11px;line-height:1.45;margin-top:2px">${esc(d.desc)}</div></div>
        <button class="sbtn" data-k="${d.key}" style="flex:none;width:50px;height:24px;border-radius:12px;cursor:pointer;font:inherit;font-size:10px;
          border:1px solid var(--border);background:${SETTINGS[d.key]?'rgba(67,224,122,.18)':'#0a0f0a'};color:${SETTINGS[d.key]?'var(--green)':'var(--green-dim)'}">${SETTINGS[d.key]?'ON':'OFF'}</button>
      </div>`).join('')
      +`<div style="display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--border);align-items:center">
          <div style="flex:1;color:#cfe;font-size:13px">Colour scheme</div>
          <div style="display:flex;gap:6px">
            ${[['phosphor','Phosphor','#43e07a'],['amber','Amber','#e8b13e'],['ice','Ice','#56cfe1']].map(([k,l,c])=>
              `<button class="tbtn" data-t="${k}" style="cursor:pointer;font:inherit;font-size:10px;border-radius:5px;padding:5px 9px;
                 border:1px solid ${SETTINGS.theme===k?c:'var(--border)'};background:${SETTINGS.theme===k?c+'22':'#0a0f0a'};color:${c}">${l}</button>`).join('')}
          </div></div></div>`;
    rec.body.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>{ SETTINGS[b.dataset.k]=!SETTINGS[b.dataset.k]; saveSettings(); applySettings(); render(); });
    rec.body.querySelectorAll('.tbtn').forEach(b=>b.onclick=()=>{ SETTINGS.theme=b.dataset.t; saveSettings(); applySettings(); render(); });
  };
  render(); focusWindow('settings');
}

/* ---- taskbar status + clock ---- */
function paintTBStatus(){
  const el=document.getElementById('tb-status'); if(!el) return;
  const c=el.dataset.contract||'';
  const tr=S.trace!=null?`<span class="tr live">TRACE ${String(S.trace).padStart(2,'0')}s</span>`:'';
  el.innerHTML=(c?`${esc(c)} `:'')+tr;
}
function tickClock(){ const d=new Date(); document.getElementById('clock').textContent=
  String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

/* ---- desktop icons + start menu ---- */
const ICONS=[
  {id:'contracts', label:'Contracts', glyph:'☰', fn:openContracts},
  {id:'browser',   label:'Tor Browser', glyph:'🌐', fn:()=>{ buildBrowser(); if(!currentEntry()) navigate(WEB_START); focusWindow('browser'); }},
  {id:'terminal',  label:'Terminal', glyph:'>_', fn:()=>{ buildTerminal(); focusWindow('terminal'); }},
  {id:'notes',     label:'Notes', glyph:'✎', fn:openNotes},
  {id:'files',     label:'Files', glyph:'▤', fn:openFiles},
  {id:'manual',    label:'Manual', glyph:'?', fn:openManual},
  {id:'settings',  label:'Settings', glyph:'⚙', fn:openSettings}
];
function buildIcons(){
  document.getElementById('icons').innerHTML=ICONS.map(i=>
    `<div class="dicon" data-id="${i.id}"><div class="gl">${i.glyph}</div>${i.label}</div>`).join('');
  document.querySelectorAll('.dicon').forEach(el=>el.ondblclick=el.onclick=()=>ICONS.find(i=>i.id===el.dataset.id).fn());
  document.getElementById('start').onclick=openContracts;
}

async function login(){
  const btn=document.getElementById('login-btn'); if(btn.disabled) return;
  btn.disabled=true;
  const steps=['verifying key','decrypting home volume','establishing relay circuit','spawning desktop'];
  for(const s of steps){ btn.textContent=s+' …'; await sleep(380+Math.random()*260); }
  document.getElementById('login').classList.add('hidden');
  buildIcons(); openContracts();
  btn.disabled=false; btn.textContent='unlock relay';
}
