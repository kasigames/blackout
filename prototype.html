<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLACKOUT // contract terminal</title>
<style>
  :root{
    --bg:#070a07; --term-bg:#0a0f0a; --green:#43e07a; --green-dim:#2a8a4d;
    --amber:#e0b343; --red:#e0533f; --cyan:#3fd0e0; --panel:#0d120d;
    --border:#16331f; --browser-bg:#11131a; --browser-fg:#c8d0d8;
    --link:#6db8ff; --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--green);font-family:var(--mono);font-size:13px}
  #app{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;height:100vh;gap:1px;background:var(--border)}
  #topbar{grid-column:1/3;background:var(--panel);display:flex;align-items:center;gap:14px;padding:6px 12px;border-bottom:1px solid var(--border)}
  #topbar .tag{color:var(--green-dim)}
  #topbar .obj{color:var(--amber);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #menu,#settings-btn{background:transparent;border:1px solid var(--border);color:var(--green-dim);border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:11px;padding:2px 8px}
  #menu:hover,#settings-btn:hover{border-color:var(--green-dim);color:var(--green)}
  #settings-btn{padding:2px 7px;font-size:13px}
  #trace{margin-left:auto;color:var(--green-dim);white-space:nowrap}
  #trace.live{color:var(--red);animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.4}}

  /* ---- terminal ---- */
  #term{background:var(--term-bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
  #term::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px);opacity:.5}
  body.no-scanlines #term::before{display:none}
  #out{flex:1;overflow-y:auto;padding:12px;white-space:pre-wrap;line-height:1.5;z-index:1}
  #inputline{display:flex;padding:8px 12px;border-top:1px solid var(--border);z-index:1;background:var(--term-bg)}
  #prompt{color:var(--green-dim);white-space:pre}
  #cmd{flex:1;background:transparent;border:none;color:var(--green);font-family:var(--mono);font-size:13px;outline:none}
  .c-dim{color:var(--green-dim)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
  .c-cyan{color:var(--cyan)} .c-white{color:#cfe} b{color:#bdffd0}

  /* ---- dossier ---- */
  #dossier{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;margin:0 0 12px;display:flex;gap:12px;white-space:normal}
  #dossier img{flex:none;width:84px;height:84px;object-fit:cover;border:1px solid var(--green-dim);border-radius:3px;background:#000;filter:grayscale(.3) contrast(1.05)}
  #dossier .meta{font-size:12px;line-height:1.55;min-width:0;overflow-wrap:anywhere}
  #dossier .meta>div{margin:1px 0}
  #dossier .meta .k{color:var(--green-dim)}

  /* ---- browser ---- */
  #browser{background:var(--browser-bg);color:var(--browser-fg);display:flex;flex-direction:column;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  #tabstrip{display:flex;align-items:stretch;background:#0f1118;border-bottom:1px solid #262b38;padding:5px 5px 0;gap:3px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;max-width:170px;padding:5px 10px;background:#15171f;border:1px solid #262b38;border-bottom:none;border-radius:6px 6px 0 0;font-size:11px;color:#8c97a8;cursor:pointer;white-space:nowrap}
  .tab.active{background:var(--browser-bg);color:#cdd5e0}
  .tab .tl{overflow:hidden;text-overflow:ellipsis}
  .tab .tx{color:#6a7585;border-radius:3px;padding:0 4px;line-height:1}
  .tab .tx:hover{background:#2a3040;color:#cdd5e0}
  .tabadd{padding:4px 11px;color:#8c97a8;cursor:pointer;font-size:15px;align-self:center;border-radius:4px}
  .tabadd:hover{color:#cdd5e0;background:#181b24}
  #chrome{display:flex;align-items:center;gap:8px;padding:7px 9px;background:#181b24;border-bottom:1px solid #262b38}
  .navbtn{background:#0d0f15;border:1px solid #2a3040;color:#aeb8c6;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){background:#222838}
  .navbtn:disabled{opacity:.3;cursor:default}
  #addr{flex:1;display:flex;align-items:center;background:#0d0f15;border:1px solid #2a3040;border-radius:14px;padding:3px 10px;gap:6px}
  #addr .lock{color:#7d59c9}
  #url{flex:1;background:transparent;border:none;color:#aeb8c6;font-size:12px;outline:none;font-family:var(--mono)}
  #page{flex:1;overflow-y:auto;padding:18px 22px;line-height:1.5}
  #page h1{font-size:20px;margin:.2em 0} #page h2{font-size:15px;color:#8c97a8;margin:1.2em 0 .3em}
  #page a{color:var(--link);cursor:pointer;text-decoration:none} #page a:hover{text-decoration:underline}
  .card{border:1px solid #262b38;border-radius:6px;padding:12px 14px;margin:10px 0;background:#151822}
  .muted{color:#7a8494} .pill{display:inline-block;background:#222838;border-radius:10px;padding:1px 9px;font-size:11px;color:#9fb0c4;margin-right:5px}
  .post{border-left:2px solid #2a3040;padding:4px 0 4px 12px;margin:10px 0}
  .searchbox{display:flex;gap:8px;margin:20px 0}
  .searchbox input{flex:1;background:#0d0f15;border:1px solid #2a3040;border-radius:16px;padding:8px 14px;color:#cdd5e0;font-size:13px;outline:none}
  .res{margin:14px 0} .res .u{color:#5fae6a;font-size:11px} .res .t{color:var(--link);font-size:15px}
  #page .btn{background:#1f6feb22;border:1px solid #2f81f7;color:#9fc7ff;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:13px;margin-top:6px;font-family:inherit}
  #page .btn:hover{background:#1f6feb33}
  #page .frow{display:flex;flex-direction:column;gap:3px;margin:9px 0}
  #page .frow label{font-size:11px;color:#7a8494}
  #page .frow input{background:#0d0f15;border:1px solid #2a3040;border-radius:5px;padding:7px 10px;color:#cdd5e0;font-size:13px;outline:none}
  #page .frow input:focus{border-color:#3f6f9f}
  .logo-tor{color:#7d59c9;font-weight:700;letter-spacing:1px}
  ::-webkit-scrollbar{width:9px} ::-webkit-scrollbar-thumb{background:#1d3a26;border-radius:4px}
  #browser ::-webkit-scrollbar-thumb{background:#2a3040}

  /* ---- contract board ---- */
  #board{position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,#0c160e,#050705);z-index:50;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:40px 16px}
  #board h1{font-size:34px;letter-spacing:6px;margin:10px 0 2px;color:var(--green)}
  #board .sub{color:var(--green-dim);margin-bottom:28px;letter-spacing:1px}
  #contract-list{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:880px}
  .contract{width:380px;text-align:left;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;cursor:pointer;transition:.15s;position:relative}
  .contract:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 6px 24px rgba(67,224,122,.08)}
  .contract .cn{font-size:17px;color:#bdffd0;font-weight:700}
  .contract .payout{position:absolute;top:16px;right:16px;color:var(--amber);font-size:15px}
  .contract .diff{font-size:11px;letter-spacing:1px;margin:3px 0 10px}
  .diff-LOW{color:var(--green)} .diff-MEDIUM{color:var(--amber)} .diff-HIGH{color:var(--red)}
  .contract .desc{color:#9fb6a6;font-size:12px;line-height:1.5;margin-bottom:12px}
  .contract .tags{display:flex;flex-wrap:wrap;gap:6px}
  .ctag{font-size:10px;letter-spacing:.5px;color:#9fb0c4;border:1px solid var(--border);border-radius:10px;padding:1px 8px}
  #board .foot{color:var(--green-dim);margin-top:30px;font-size:11px}

  /* ---- settings modal ---- */
  #settings{position:fixed;inset:0;background:rgba(3,6,4,.82);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px}
  #settings.modal-hidden{display:none}
  .settings-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:22px;width:460px;max-width:100%}
  .settings-box .sh{color:var(--green);letter-spacing:2px;margin-bottom:16px;font-size:15px}
  .srow{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--border)}
  .srow .stext{flex:1} .srow .stext .sl{color:#cfe;font-size:13px} .srow .stext .sd{color:var(--green-dim);font-size:11px;line-height:1.45;margin-top:2px}
  .toggle{flex:none;width:54px;height:24px;border-radius:12px;border:1px solid var(--border);background:#0a0f0a;cursor:pointer;position:relative;transition:.15s;font:inherit}
  .toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--green-dim);transition:.15s}
  .toggle[data-on="true"]{background:rgba(67,224,122,.18);border-color:var(--green-dim)}
  .toggle[data-on="true"] .knob{left:32px;background:var(--green)}
  .toggle .lbl{position:absolute;top:5px;font-size:9px;letter-spacing:.5px;color:var(--green-dim)}
  .toggle[data-on="true"] .lbl{left:8px} .toggle[data-on="false"] .lbl{right:7px}
  #settings-close{margin-top:18px;background:transparent;border:1px solid var(--border);color:var(--green-dim);border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:12px;padding:6px 16px}
  #settings-close:hover{border-color:var(--green-dim);color:var(--green)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="tag">BLACKOUT</span>
    <button id="menu">⏏ contracts</button>
    <button id="settings-btn" title="Settings">⚙</button>
    <span class="obj" id="obj-line">CONTRACT: —</span>
    <span id="trace">TRACE: idle</span>
  </div>

  <div id="term">
    <div id="out"></div>
    <div id="inputline">
      <span id="prompt">root@blackout:~$&nbsp;</span>
      <input id="cmd" autocomplete="off" autofocus spellcheck="false">
    </div>
  </div>

  <div id="browser">
    <div id="tabstrip"></div>
    <div id="chrome">
      <button class="navbtn" id="back" title="Back">‹</button>
      <button class="navbtn" id="fwd" title="Forward">›</button>
      <button class="navbtn" id="home" title="Home (TORCH search)">⌂</button>
      <div id="addr"><span class="lock">◉</span><input id="url" value="tor://search.onion"></div>
    </div>
    <div id="page"></div>
  </div>
</div>

<div id="settings" class="modal-hidden">
  <div class="settings-box">
    <div class="sh">⚙ SETTINGS</div>
    <div id="settings-rows"></div>
    <button id="settings-close">close</button>
  </div>
</div>

<div id="board">
  <h1>BLACKOUT</h1>
  <div class="sub">// contract board · select a job</div>
  <div id="contract-list"></div>
  <div class="foot">payout &amp; reputation are cosmetic for now — economy comes later (see IDEAS.md)</div>
</div>

<script>
/* ============================================================================
   CONTRACTS
   ----------------------------------------------------------------------------
   Each contract carries board metadata + a `world` blob in the schema the local
   LLM will eventually fill (one generation per contract, from archetype +
   objective + a tagged face). The engine below is fixed; difficulty lives as
   FLAGS on the world / per machine:
     machine.exposed       -> its subnet is reachable from the internet at start
     machine.ids           -> connecting starts a TRACE countdown
     machine.trace_seconds -> how long you have
     machine.hidden_fs     -> no path handed to you; explore with cd/ls
     machine.reveals_subnet-> connecting exposes a deeper subnet (lateral move)
     world.cred_drops      -> creds discoverable by `cat`-ing a file (pivoting)
   ========================================================================== */

const CONTRACTS = [
{
  id:"paper-trail", name:"Paper Trail", difficulty:"LOW", payout:"₿0.4",
  tags:["SINGLE TARGET","SOCIAL ENG.","TRACED"],
  desc:"A lawyer is sitting on a settlement draft. Get onto her workstation and shred it before the morning backup. One machine, one document.",
  world:{
    mission:{
      handle:"root", gender:"female", faceId:65,
      target_name:"Diane Keller", target_role:"Senior Partner — Harlow & Partners LLP",
      objective_type:"shred", target_artifact:"/home/dkeller/legal/settlement_draft.pdf",
      constraint:"before the 09:00 offsite backup",
      briefing:[
        "Diane Keller is sitting on a document she shouldn't have — a settlement",
        "draft. Get onto her workstation and SHRED it. No copies. She's careless",
        "on social media, so her password won't be hard to reason out.",
        "Her firm's workstation has an IDS — once you're in, don't linger."
      ]
    },
    facts:{
      pet:{label:"Pet name", value:"Biscuit", type:"cred"},
      year:{label:"Birth year", value:"1971", type:"cred"},
      city:{label:"Hometown", value:"Dayton", type:"cred"},
      email:{label:"Login handle", value:"dkeller", type:"lead"},
      emailfmt:{label:"Firm email format", value:"[first-initial][last]@harlowpartners.com", type:"lead"},
      subnet:{label:"Partner subnet", value:"10.0.4.0/24", type:"lead"}
    },
    machines:[
      { ip:"10.0.4.17", hostname:"dkeller-ws", label:"Diane Keller — workstation",
        subnet:"10.0.4.0/24", ids:true, trace_seconds:75, hidden_fs:false, home:"/home/dkeller",
        account:{user:"dkeller", password:"Biscuit1971"},
        files:{
          "/home/dkeller/legal/settlement_draft.pdf":"[ENCRYPTED PDF · 1.2MB] Harlow & Partners — Settlement Draft (CONFIDENTIAL).",
          "/home/dkeller/legal/billing_q2.xlsx":"[spreadsheet] routine quarterly billing. nothing here.",
          "/home/dkeller/notes.txt":"ugh IT keeps nagging about password reuse. it's the dog + the year, leave me alone.",
          "/home/dkeller/.mail/inbox":"From: it@harlowpartners.com — Reminder: offsite backup runs 09:00 daily. Do not power off."
        }
      }
    ],
    web:{ start:"tor://search.onion", sites:{
      "tor://search.onion":{ type:"search" },
      "prolink.onion/in/diane-keller":{ discover:["city","email"],
        keywords:"diane keller lawyer attorney partner harlow dayton", title:"ProLink — Diane Keller",
        html:`<h1>Diane Keller</h1><div class="muted">Senior Partner — Harlow &amp; Partners LLP</div>
          <div style="margin:8px 0"><span class="pill">Corporate Law</span><span class="pill">Litigation</span></div>
          <div class="card"><b>Location:</b> Dayton, Ohio<br><b>Contact:</b> <span class="muted">dkeller@harlowpartners.com</span></div>
          <p class="muted">"20+ years protecting what matters to my clients."</p>` },
      "harlowpartners.com/team":{ discover:["emailfmt","subnet"],
        keywords:"diane keller harlow partners firm law team email contact", title:"Harlow & Partners — Our Team",
        html:`<h1>Harlow &amp; Partners LLP</h1><h2>Remote &amp; Contact</h2>
          <div class="card">Staff email follows the firm standard: <b>[first initial][last name]@harlowpartners.com</b><br>
          <span class="muted">e.g. Diane Keller → dkeller@harlowpartners.com</span></div>
          <div class="card muted">Internal systems reachable via the partner subnet 10.0.4.0/24. Workstations are named <b>[user]-ws</b>.</div>` },
      "friendwall.onion/diane.k":{ discover:["pet","year"],
        keywords:"diane keller diane k dayton dog biscuit birthday personal social", title:"FriendWall — Diane K.",
        html:`<h1>Diane K. <span class="muted" style="font-size:12px">· Dayton, OH</span></h1>
          <div class="post">🐕 Happy 8th birthday to my boy <b>Biscuit</b>! Best golden retriever a girl could ask for.</div>
          <div class="post">Another trip around the sun 🎂 born in <b>'71</b> and not slowing down. Vintage and proud!</div>
          <div class="post muted">Throwback to growing up in Dayton... simpler times.</div>` }
    }},
    solution_path:["friendwall→pet+year","harlow→handle+subnet","wordlist→Biscuit1971","crack dkeller→connect→shred→disconnect"]
  }
},
{
  id:"glass-house", name:"Glass House", difficulty:"HIGH", payout:"₿2.1",
  tags:["MULTI-STAGE","LATERAL MOVE","HIDDEN FS","TRACED CORE"],
  desc:"Burn a buried audit at Veridian Dynamics. No direct route in — socially engineer a front-desk login, pivot to the internal file server, then find the file yourself. The core is watched.",
  world:{
    mission:{
      handle:"root", gender:"male", faceId:52,
      target_name:"Tom Reyes", target_role:"Front Desk — Veridian Dynamics  (your way in)",
      objective_type:"shred", target_artifact:"/srv/legal/audits/2024/internal_audit_Q3.pdf",
      constraint:"the audit gets filed Monday — destroy it first",
      briefing:[
        "Veridian Dynamics has an internal audit that needs to disappear before",
        "it's filed. You can't reach the file server directly. Tom Reyes works",
        "their front desk — soft target, talks too much online. Crack his login,",
        "get a foothold on the reception box, then find your own way to the core.",
        "The file server is monitored. The path to the document is not labelled."
      ]
    },
    facts:{
      team:{label:"Favorite team", value:"Lakers", type:"cred"},
      yr:{label:"Fan since (year)", value:"2016", type:"cred"},
      hand:{label:"Login handle", value:"treyes", type:"lead"},
      fmt:{label:"Email format", value:"[first-initial][last]@veridian-dyn.com", type:"lead"},
      vpn:{label:"VPN / reception subnet", value:"172.16.5.0/24", type:"lead"}
    },
    machines:[
      { ip:"172.16.5.21", hostname:"recep-ws", label:"reception workstation (VPN-exposed)",
        subnet:"172.16.5.0/24", exposed:true, ids:false, hidden_fs:false, home:"/home/treyes",
        account:{user:"treyes", password:"Lakers2016"}, reveals_subnet:"10.20.0.0/24",
        files:{
          "/home/treyes/readme_from_it.txt":"VPN's all set. Anything internal lives on the 10.20.0.x network. Backup service login is in creds.txt — DON'T share it.",
          "/home/treyes/creds.txt":"svc_backup : Pinecone$Vault9   # file server 10.20.0.40 — nightly backup account",
          "/home/treyes/lunch_orders.xlsx":"[spreadsheet] who owes for the taco run. not your problem."
        }
      },
      { ip:"10.20.0.40", hostname:"vd-fileserver", label:"Veridian internal file server  [IDS]",
        subnet:"10.20.0.0/24", ids:true, trace_seconds:60, hidden_fs:true, home:"/",
        account:{user:"svc_backup", password:"Pinecone$Vault9"},
        files:{
          "/etc/motd":"Veridian Dynamics // authorized access only. All activity is logged.",
          "/srv/legal/audits/2024/internal_audit_Q3.pdf":"[PDF · 4.4MB] INTERNAL AUDIT Q3 2024 — findings (RESTRICTED).",
          "/srv/legal/audits/2023/audit_2023_final.pdf":"[PDF] last year's audit. signed off, harmless.",
          "/srv/legal/contracts/nda_template.docx":"[doc] boilerplate NDA template.",
          "/srv/hr/payroll/june.csv":"[csv] payroll run. not the target — leave it.",
          "/srv/backups/nightly.log":"[log] backup ran 02:00. 0 errors."
        }
      }
    ],
    cred_drops:[
      { path:"/home/treyes/creds.txt", user:"svc_backup", ip:"10.20.0.40", password:"Pinecone$Vault9", note:"file server backup account" }
    ],
    web:{ start:"tor://search.onion", sites:{
      "tor://search.onion":{ type:"search" },
      "prolink.onion/in/tom-reyes":{ discover:["hand"],
        keywords:"tom reyes veridian dynamics front desk reception los angeles", title:"ProLink — Tom Reyes",
        html:`<h1>Tom Reyes</h1><div class="muted">Front Desk Coordinator — Veridian Dynamics</div>
          <div class="card"><b>Location:</b> Los Angeles, CA<br><b>Contact:</b> <span class="muted">treyes@veridian-dyn.com</span></div>
          <p class="muted">"Keeping the front of house running since 2019."</p>` },
      "friendwall.onion/tommyr":{ discover:["team","yr"],
        keywords:"tom reyes tommy lakers basketball la los angeles sports", title:"FriendWall — Tommy R.",
        html:`<h1>Tommy R. <span class="muted" style="font-size:12px">· Los Angeles</span></h1>
          <div class="post">🏀 Die-hard <b>Lakers</b> fan. Been to every home opener.</div>
          <div class="post">Still not over that <b>2016</b> season — the year I went all in on this team. 💜💛</div>
          <div class="post muted">Front desk life. Coffee #4.</div>` },
      "veridian-dyn.com/remote":{ discover:["fmt","vpn"],
        keywords:"veridian dynamics remote vpn access email it portal employee", title:"Veridian Dynamics — Remote Access",
        html:`<h1>Veridian Dynamics</h1><h2>Employee Remote Access</h2>
          <div class="card">Login: <b>[first initial][last name]@veridian-dyn.com</b><br>
          <span class="muted">Reception &amp; front-of-house connect through the VPN on <b>172.16.5.0/24</b>.</span></div>
          <div class="card muted">Internal services are segmented and not reachable from the VPN directly.</div>` },
      "shutterworld.com/treyes":{ keywords:"tom reyes photography wedding portrait denver portfolio",
        title:"Tom Reyes Photography", html:`<h1>Tom Reyes Photography</h1>
          <div class="muted">Denver, CO · Weddings &amp; Portraits</div>
          <div style="margin:10px 0"><span class="pill">Portfolio</span><span class="pill">About</span><span class="pill">Booking</span></div>
          <p class="muted">"Capturing love stories across the Rockies since 2014. Now booking spring &amp; summer weddings."</p>
          <div class="card">★★★★★ "Tom was incredible at our wedding — couldn't recommend him more!" — Sarah &amp; Mike</div>` },
      "newsline.onion/veridian-cuts":{ keywords:"veridian dynamics layoffs news business",
        title:"NewsLine — Veridian Dynamics cuts 200 roles", html:`<h1>Veridian Dynamics cuts 200 roles</h1>
          <div class="muted">NewsLine · Business · 3 days ago</div>
          <p>Veridian Dynamics confirmed it will cut roughly 200 positions this quarter amid what insiders describe as a "pending compliance review." The company declined to comment on the nature of the review.</p>
          <p class="muted">Shares fell 4% in early trading on the news.</p>` }
    }},
    solution_path:["friendwall→team+yr","wordlist→Lakers2016","crack treyes@172.16.5.21→connect","cat creds.txt→svc_backup creds + reveal 10.20.0.0/24","scan→fileserver","connect→explore hidden fs→shred buried audit→disconnect before trace"]
  }
},
{
  id:"cold-inbox", name:"Cold Inbox", difficulty:"MEDIUM", payout:"₿1.3",
  tags:["NO PROFILE","EMAIL PIVOT","PASSWORD RESET"],
  desc:"Marcus Vance is a fixer who keeps leverage on people — including our client. He's a ghost: no socials, nothing to social-engineer. The way in is his inbox. Find it, pivot through a password reset, and burn the dossier.",
  world:{

function renderBoard(){

  const c=CONTRACTS.find(x=>x.id===id); if(!c)return;

  runGen++; W=(window.structuredClone?structuredClone(c.world):JSON.parse(JSON.stringify(c.world))); resetState();

/* ---- browser (tabbed, per-tab history) ---- */
const backBtn=document.getElementById('back'), fwdBtn=document.getElementById('fwd');
let tabs=[{hist:[],hi:-1}], activeTab=0;
function T(){ return tabs[activeTab]; }
function currentEntry(){ const t=T(); return t.hi>=0?t.hist[t.hi]:null; }
function resetBrowser(){ tabs=[{hist:[],hi:-1}]; activeTab=0; }
function navigate(url,q){ url=(url||'').trim(); if(!url) url=W.web.start; go({url,q}); }
function goHome(){ navigate(W.web.start); }
function go(entry){ const t=T(); t.hist=t.hist.slice(0,t.hi+1); t.hist.push(entry); t.hi=t.hist.length-1; render(entry); renderTabs(); }
function render(entry){
  if(!entry){ pageEl.innerHTML=''; urlBar.value=''; updateNav(); return; }
  urlBar.value=entry.url;
  const site=W&&W.web.sites[entry.url];
  if(!site){ pageEl.innerHTML=`<h1 style="color:#e0533f">Unable to connect</h1><p class="muted">No relay route to <b>${esc(entry.url)}</b>.</p>`; updateNav(); return; }
  if(site.discover){ site.discover.forEach(f=>discover(f)); }
  if(site.type==="search"){ renderSearch(entry.q); }
  else if(site.type==="service"){ renderService(entry.url); }
  else { pageEl.innerHTML=site.html; }
  updateNav();
}
function updateNav(){ const t=T(); backBtn.disabled=t.hi<=0; fwdBtn.disabled=t.hi>=t.hist.length-1; }
backBtn.onclick=()=>{ const t=T(); if(t.hi>0){ t.hi--; render(t.hist[t.hi]); renderTabs(); } };
fwdBtn.onclick=()=>{ const t=T(); if(t.hi<t.hist.length-1){ t.hi++; render(t.hist[t.hi]); renderTabs(); } };
document.getElementById('home').onclick=goHome;

function tabLabel(t){
  const e=t.hi>=0?t.hist[t.hi]:null;
  if(!e) return 'New Tab';
  const site=W&&W.web.sites[e.url];
  if(site&&site.type==='search') return e.q?('“'+e.q+'”'):'TORCH';
  if(site&&site.title) return site.title.split('—')[0].trim()||e.url;
  return e.url.replace(/^\w+:\/\//,'');
}
function renderTabs(){
  const strip=document.getElementById('tabstrip');
  strip.innerHTML=tabs.map((t,i)=>`<div class="tab ${i===activeTab?'active':''}" data-i="${i}">
      <span class="tl">${esc(tabLabel(t))}</span>${tabs.length>1?`<span class="tx" data-close="${i}">×</span>`:''}</div>`).join('')
    +`<div class="tabadd" id="tabadd" title="New tab">+</div>`;
  strip.querySelectorAll('.tab').forEach(el=>el.onclick=()=>switchTab(+el.dataset.i));
  strip.querySelectorAll('[data-close]').forEach(x=>x.onclick=e=>{ e.stopPropagation(); closeTab(+x.dataset.close); });
  document.getElementById('tabadd').onclick=newTab;
  updateNav();
}
function switchTab(i){ activeTab=i; render(currentEntry()); renderTabs(); }
function newTab(){ tabs.push({hist:[],hi:-1}); activeTab=tabs.length-1; go({url:W.web.start,q:undefined}); }
function closeTab(i){
  if(tabs.length<=1) return;
  tabs.splice(i,1);
  if(activeTab>=tabs.length) activeTab=tabs.length-1; else if(activeTab>i) activeTab--;
  render(currentEntry()); renderTabs();
}
function renderSearch(q){

     <div class="searchbox"><input id="q" value="${q?esc(q):''}" placeholder="search the deep index..."></div>`;

      `<div class="res"><div class="u">${esc(u)}</div><a data-url="${esc(u)}" class="t">${esc(s.title)}</a></div>`).join('')

    if(s._resetPending){
      html+=`<div class="card"><b>Reset your password</b>
        <div class="muted" style="font-size:12px;margin:4px 0 8px">A 6-digit code was sent to your recovery email. Open that inbox to read it.</div>
        <div class="frow"><label>reset code</label><input id="svc-code" autocomplete="off"></div>
        <div class="frow"><label>new password</label><input id="svc-newpass" autocomplete="off"></div>
        <button class="btn" onclick="svcReset('${url}')">Set new password</button>
        <div id="svc-msg2" class="muted" style="margin-top:8px"></div></div>`;
    }
    pageEl.innerHTML=html; return;
  }
  // authed
  if(!s._opened){ s._opened=true; applyServiceOpen(s); }
  if(s.kind==='webmail'){
    pageEl.innerHTML=`<h1>${esc(s.name)}</h1><div class="muted">${esc(s.account.user)} · Inbox (${s.messages.length})</div>`
      + s.messages.map(m=>`<div class="card"><div><b>${esc(m.subj)}</b></div>
          <div class="muted" style="font-size:11px;margin:2px 0 6px">from ${esc(m.from)}</div>
          <div>${m.body}</div></div>`).join('')
      + `<div style="margin-top:6px"><a onclick="svcLogout('${url}')">sign out</a></div>`;
  } else {
    pageEl.innerHTML=`<h1>${esc(s.name)}</h1><div class="muted">signed in as ${esc(s.account.user)}</div>`
      + (s.contents_html||'') + `<div style="margin-top:6px"><a onclick="svcLogout('${url}')">sign out</a></div>`;
  }
}
function svcLogin(url){
  const s=W.web.sites[url].service;
  const u=(document.getElementById('svc-user').value||'').trim();
  const pw=document.getElementById('svc-pass').value||'';
  if(u===s.account.user && pw===s.account.password){ S.auth.add(url); render(currentEntry()); }
  else document.getElementById('svc-msg').textContent='Incorrect email or password.';
}
function svcForgot(url){
  const s=W.web.sites[url].service;
  const code=String(Math.floor(100000+Math.random()*900000));
  s._resetCode=code; s._resetPending=true;
  const inbox=W.web.sites[s.reset_inbox] && W.web.sites[s.reset_inbox].service;
  if(inbox){ inbox.messages.unshift({from:`${s.name} Security`, subj:'Your password reset code',
    body:`Someone requested a password reset. Your one-time code is <b>${code}</b>. It expires in 15 minutes. If this wasn't you, ignore this email.`}); }
  render(currentEntry());
}
function svcReset(url){
  const s=W.web.sites[url].service;
  const code=(document.getElementById('svc-code').value||'').trim();
  const np=document.getElementById('svc-newpass').value||'';
  if(code!==s._resetCode){ document.getElementById('svc-msg2').textContent='Invalid or expired code.'; return; }
  if(!np){ document.getElementById('svc-msg2').textContent='Enter a new password.'; return; }
  s.account.password=np; s._resetPending=false; S.auth.add(url); render(currentEntry());
}
function svcLogout(url){ S.auth.delete(url); render(currentEntry()); }
function applyServiceOpen(s){
  const o=s.on_open; if(!o) return;
  if(o.subnet) S.knownSubnets.add(o.subnet);
  if(o.cred){
    S.foundCreds[`${o.cred.user}@${o.cred.ip}`]=o.cred.password;
    S.cracked.add(`${o.cred.user}@${o.cred.ip}`);
    line(`  ► credentials acquired via ${s.name}: ${o.cred.user}@${o.cred.ip}  (${o.cred.note||''})`,'c-cyan');
    line(`  subnet ${o.subnet} now reachable — \`scan\`, then \`connect ${o.cred.ip}\`.`,'c-dim');
  }
}

pageEl.addEventListener('click',e=>{ const a=e.target.closest('[data-url]'); if(a){ navigate(a.dataset.url); } });
urlBar.addEventListener('keydown',e=>{ if(e.key==='Enter') navigate(urlBar.value.trim()); });

function discover(key){
  if(!SETTINGS.autoIntel) return;            // hard mode: the page text is your only source
  if(S.discovered.has(key)) return;
  S.discovered.add(key);
  const f=W.facts[key];
  if(/^\d+\.\d+\.\d+\.\d+\/\d+$/.test(f.value)) S.knownSubnets.add(f.value);
  if(f.type==='cred') line(`  [pwd-clue] ${f.label}: ${f.value}`,'c-amber');
  else                line(`  [intel]    ${f.label}: ${f.value}`,'c-cyan');
}

/* ---- trace ---- */
function startTrace(sec){
  S.trace=sec; traceEl.classList.add('live'); paintTrace();
  S.traceTimer=setInterval(()=>{ S.trace--; paintTrace(); if(S.trace<=0){ clearInterval(S.traceTimer); caught(); } },1000);
}
function stopTrace(){ if(S.traceTimer)clearInterval(S.traceTimer); S.traceTimer=null; S.trace=null; traceEl.classList.remove('live'); traceEl.textContent="TRACE: idle"; }
function paintTrace(){ traceEl.textContent=`TRACE: ${String(S.trace).padStart(2,'0')}s to lock`; }
function caught(){
  S.conn=null; stopTrace();
  line(""); line("████ CONNECTION TRACED. Counter-intrusion locked your relay. ████","c-red");
  line("CONTRACT FAILED. Hit ⏏ contracts to pick another job.","c-red");
  lockInput();
}
function lockInput(){ cmd.disabled=true; cmd.placeholder="session ended — ⏏ contracts to restart"; }

/* ---- filesystem helpers (for hidden_fs machines) ---- */
function normPath(pth){ const st=[]; for(const seg of pth.split('/')){ if(!seg||seg==='.')continue; if(seg==='..')st.pop(); else st.push(seg);} return '/'+st.join('/'); }
function resolvePath(cwd,arg){ if(!arg) return cwd; return arg.startsWith('/')?normPath(arg):normPath(cwd+'/'+arg); }
function isDir(files,dir){ if(dir==='/'||dir==='') return true; return Object.keys(files).some(k=>k.startsWith(dir+'/')); }
function listDir(files,dir){
  const base = dir==='/'?'':dir; const dirs=new Set(), fs=[];
  for(const k of Object.keys(files)){
    if(base==='' || k.startsWith(base+'/')){
      const rest=k.slice(base.length).replace(/^\//,'');
      const seg=rest.split('/')[0]; if(!seg) continue;
      if(rest.includes('/')) dirs.add(seg); else fs.push(seg);
    }
  }
  return {dirs:[...dirs].sort(), files:fs.sort()};
}
function conn(){ if(!S.conn){ line("not connected to a host. `connect <ip>` first.","c-amber"); return null; } return W.machines.find(x=>x.ip===S.conn); }

/* ---- command table ---- */
const CMD={
  help(){
    line("recon / access commands:","c-dim");
    [["help","this list"],["mission","re-read the contract dossier"],["facts","intel gathered so far"],
     ["note [add <text>]","jot intel to ~/notes.txt on your box"],
     ["scan","probe known subnets for live hosts"],["wordlist --gen","build a password list from your clues"],
     ["crack <user>@<ip>","attempt login using your wordlist"],["connect <ip>","open a session (may start a trace)"],
     ["ls [path]","list files (localhost when not connected)"],["cd <path>","change directory (hidden filesystems)"],
     ["pwd","print working directory"],["cat <path>","read a file"],
     ["exfil <path>","copy a remote file to ~/loot/"],["shred <path>","irrecoverably destroy a file"],
     ["upload <drop>","publish ~/loot to a leak drop"],["disconnect","drop the session"],["clear","clear the screen"]
    ].forEach(([c,d])=>p(`  <b>${esc(c)}</b><span class="c-dim"> — ${esc(d)}</span>`));
  },
  mission(){ renderDossier(); W.mission.briefing.forEach(l=>line("  "+l,'c-amber')); },
  facts(){
    if(!SETTINGS.autoIntel){
      line("auto-extract is OFF — you're tracking intel yourself.","c-dim");
      line(`wordlist seeds: ${S.seeds.length?S.seeds.join(' '):'(none — `wordlist add <word>`)'}`, S.seeds.length?'c-amber':'c-dim');
      line(`known subnets: ${S.knownSubnets.size?[...S.knownSubnets].join(' '):'(none — `scan <subnet>`)'}`, S.knownSubnets.size?'c-cyan':'c-dim');
      return;
    }
    if(!S.discovered.size){ line("No intel yet. Use the browser to dig into the target.","c-dim"); return; }
    const got=[...S.discovered].map(k=>W.facts[k]);
    const creds=got.filter(f=>f.type==='cred'), leads=got.filter(f=>f.type==='lead');
    line("password clues (feed `wordlist --gen`):","c-dim");
    creds.length?creds.forEach(f=>p(`  <span class="c-amber">${esc(f.label)}: ${esc(f.value)}</span>`)):p(`  <span class="c-dim">none yet — try personal/social pages</span>`);
    line("intel / leads:","c-dim");
    leads.length?leads.forEach(f=>p(`  <span class="c-cyan">${esc(f.label)}: ${esc(f.value)}</span>`)):p(`  <span class="c-dim">none yet</span>`);
  },
  scan(arg){
    if(arg){
      if(/^\d+\.\d+\.\d+\.\d+\/\d+$/.test(arg)){ S.knownSubnets.add(arg); line(`registered subnet ${arg}.`,'c-dim'); }
      else { line("usage: scan [subnet]   e.g. scan 10.0.4.0/24","c-dim"); return; }
    }
    const visible=W.machines.filter(m=>S.knownSubnets.has(m.subnet));
    if(!visible.length){ line("no reachable hosts — you don't know any live subnets yet.","c-dim");
      line("recon the target's org for a subnet (then `scan <subnet>`), or get a foothold and scan again.","c-dim"); return; }
    line(`scanning ${[...S.knownSubnets].join(', ')} ...`,'c-dim');
    visible.forEach(m=>p(`  <span class="c-white">${m.ip}</span>  <b>${m.hostname}</b>${m.ids?' <span class="c-red">[IDS]</span>':''} <span class="c-dim">— ${esc(m.label)}</span>`));
  },
  wordlist(arg){
    const parts=(arg||'').split(/\s+/).filter(Boolean);
    if(parts[0]==='add'){
      const words=parts.slice(1);
      if(!words.length){ line("usage: wordlist add <word> [word ...]","c-dim"); return; }
      S.seeds.push(...words); line(`added ${words.length} seed(s): ${words.join(' ')}`,'c-dim'); return;
    }
    if(arg!=="--gen"){ line("usage: wordlist --gen   |   wordlist add <word ...>","c-dim"); return; }
    let facts;
    if(SETTINGS.autoIntel){
      facts=[...S.discovered].map(k=>W.facts[k]).filter(f=>f.type==='cred').map(f=>f.value);
      if(!facts.length){ line("no password clues yet — those come from personal life, not the network. dig deeper.","c-amber"); return; }
    } else {
      facts=[...new Set(S.seeds)];
      if(!facts.length){ line("no seeds yet. read the target's pages, then `wordlist add <word>` for each clue you spot.","c-amber"); return; }
    }
    const list=new Set(); const caps=s=>s.charAt(0).toUpperCase()+s.slice(1);
    for(const a of facts){ list.add(a); list.add(caps(a));
      for(const b of facts){ if(a!==b){ list.add(caps(a)+b); list.add(a+b); list.add(caps(a)+"!"); } } }
    S.wordlist=[...list];
    line(`generated ${S.wordlist.length} candidates from ${facts.length} clues:`,'c-dim');
    p(`  <span class="c-dim">${esc(S.wordlist.slice(0,12).join('  '))} ...</span>`);
  },
  crack(arg){
    if(!arg||!arg.includes('@')){ line("usage: crack <user>@<ip>","c-dim"); return; }
    const [user,ip]=arg.split('@');
    const m=W.machines.find(x=>x.ip===ip);
    if(!m){ line(`no host at ${ip}.`,'c-amber'); return; }
    if(S.cracked.has(`${user}@${ip}`)){ line("you already have valid creds for that account. `connect "+ip+"`","c-dim"); return; }
    if(!S.wordlist){ line("no wordlist loaded. run `wordlist --gen` first.","c-amber"); return; }
    return crackAnim(m,user,ip);
  },
  async connect(arg){
    const m=W.machines.find(x=>x.ip===arg);
    if(!m){ line("usage: connect <ip>  (no such host)","c-amber"); return; }
    if(!S.knownSubnets.has(m.subnet)){ line("no route to that host — its subnet isn't reachable from here.","c-red"); return; }
    if(!S.cracked.has(`${m.account.user}@${arg}`)){ line("access denied — no valid credentials. crack the account first.","c-red"); return; }
    if(S.traceTimer) stopTrace();
    S.conn=arg; S.cwd=m.home||"/"; updatePrompt();
    await typeLine(`opening session to ${m.hostname} (${arg}) ...`,'c-dim',5);
    if(m.ids && SETTINGS.trace){ line("session live. ⚠ this host has an IDS — it's tracing you. move.","c-red"); startTrace(m.trace_seconds||60); }
    else if(m.ids){ line("session live. (host has an IDS, but trace is disabled in settings.)","c-dim"); }
    else { line("session live. no IDS detected — take your time here.","c-dim"); }
    if(m.reveals_subnet && !S.knownSubnets.has(m.reveals_subnet)){
      S.knownSubnets.add(m.reveals_subnet);
      line(`  internal route discovered: ${m.reveals_subnet} — re-run \`scan\`.`,'c-cyan');
    }
  },
  pwd(){ line(S.cwd||"/","c-white"); },
  cd(arg){
    const m=activeHost();
    if(!m.hidden_fs){ line("cd: this host has a flat view — just `ls` and `cat`.","c-dim"); return; }
    const t=resolvePath(S.cwd,arg||m.home||"/");
    if(isDir(m.files,t)){ S.cwd=t; line(t,'c-dim'); } else line(`cd: ${arg}: no such directory`,'c-amber');
  },
  ls(arg){
    const m=activeHost();
    if(!m.hidden_fs){
      Object.keys(m.files).forEach(f=>{ const tgt=f===W.mission.target_artifact;
        p(`  <span class="${tgt?'c-red':'c-white'}">${esc(f)}</span>${tgt?' <span class="c-red">← target</span>':''}`); });
      return;
    }
    const dir=resolvePath(S.cwd,arg||'');
    if(!isDir(m.files,dir)){ line(`ls: ${arg}: no such directory`,'c-amber'); return; }
    const {dirs,files}=listDir(m.files,dir);
    if(!dirs.length&&!files.length){ line("(empty)","c-dim"); return; }
    dirs.forEach(d=>p(`  <span class="c-cyan">${esc(d)}/</span>`));
    files.forEach(f=>p(`  <span class="c-white">${esc(f)}</span>`));
  },
  cat(arg){
    const m=activeHost();
    if(!arg){ line("usage: cat <path>","c-dim"); return; }
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`cat: ${arg}: no such file`,'c-amber'); return; }
    line(m.files[path]||'(empty file)', m.files[path]?'c-white':'c-dim');
    const drop=(W.cred_drops||[]).find(d=>d.path===path);
    if(drop && !S.cracked.has(`${drop.user}@${drop.ip}`)){
      S.foundCreds[`${drop.user}@${drop.ip}`]=drop.password; S.cracked.add(`${drop.user}@${drop.ip}`);
      line(`  ► credentials acquired: ${drop.user}@${drop.ip}  (${drop.note||''})`,'c-cyan');
      line(`  you can now: connect ${drop.ip}`,'c-dim');
    }
  },
  async shred(arg){
    const m=conn(); if(!m)return;
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`shred: ${arg}: no such file`,'c-amber'); return; }
    if(path!==W.mission.target_artifact){ line(`shred: refusing — ${arg} is not the contract target. don't leave noise.`,'c-amber'); return; }
    await typeLine(`shredding ${path}`,'c-red',3);
    for(let i=0;i<=100;i+=20){ await sleep(160); line(`  overwriting pass ${i/20+1}/6  [${'█'.repeat(i/10)}${'░'.repeat(10-i/10)}]`,'c-dim'); }
    delete m.files[path]; S.objComplete=true;
    line("  target destroyed. no recoverable copy.","c-red");
    line("► objective complete. now `disconnect` before the trace locks!","c-amber");
  },
  async exfil(arg){
    const m=conn(); if(!m)return;
    if(!arg){ line("usage: exfil <path>","c-dim"); return; }
    const path=m.hidden_fs?resolvePath(S.cwd,arg):arg;
    if(!(path in m.files)){ line(`exfil: ${arg}: no such file`,'c-amber'); return; }
    const base=path.split('/').pop();
    await typeLine(`exfiltrating ${path}  →  ~/loot/${base}`,'c-cyan',3);
    for(let i=0;i<=100;i+=25){ await sleep(140); line(`  [${'█'.repeat(i/10)}${'░'.repeat(10-i/10)}] ${i}%`,'c-dim'); }
    HOME.files['/root/loot/'+base]=m.files[path];
    line(`  copied to ~/loot/${base} on your box.`,'c-cyan');
    if(path===W.mission.target_artifact){
      if(W.mission.objective_type==='exfil'){ S.objComplete=true; line("► objective file secured. `disconnect` to finish.","c-amber"); }
      else if(W.mission.objective_type==='leak'){ S.exfilDone=true; line(`► got it. now \`disconnect\`, then \`upload ${W.mission.leak_dest}\`.`,"c-amber"); }
    }
  },
  async upload(arg){
    if(W.mission.objective_type!=='leak'){ line("upload: this contract isn't a leak job.","c-dim"); return; }
    if(!S.exfilDone){ line("nothing staged. `exfil` the target file first.","c-amber"); return; }
    if(!arg){ line(`usage: upload ${W.mission.leak_dest||'<drop>'}`,"c-dim"); return; }
    if(arg!==W.mission.leak_dest){ line(`upload: ${arg}: not the drop the client specified.`,"c-amber"); return; }
    if(S.conn){ line("upload from your own box — `disconnect` from the remote host first.","c-amber"); return; }
    await typeLine(`uploading ~/loot  →  ${arg} ...`,'c-cyan',3);
    await sleep(500);
    line("  published. it's out there now — can't be un-leaked.","c-cyan");
    S.objComplete=true; completeContract();
  },
  note(arg){
    const f='/root/notes.txt';
    if(!arg){ const c=HOME.files[f]; line(c||'(notes empty — `note add <text>`)', c?'c-white':'c-dim'); return; }
    if(arg==='clear'){ HOME.files[f]=''; line("notes cleared.","c-dim"); return; }
    if(arg.startsWith('add ')){ const t=arg.slice(4).trim(); if(!t){ line("usage: note add <text>","c-dim"); return; }
      HOME.files[f]=(HOME.files[f]?HOME.files[f]+'\n':'')+'• '+t; line("noted.","c-dim"); return; }
    line("usage: note  |  note add <text>  |  note clear","c-dim");
  },
  disconnect(){
    if(!S.conn){ line("not connected.","c-dim"); return; }
    S.conn=null; stopTrace(); S.cwd=HOME.home; updatePrompt();
    line("session dropped. relay scrubbed.","c-dim");
    if(S.objComplete && !S.done){ win(); }
    else if(S.exfilDone && W.mission.objective_type==='leak'){ line(`loot is in ~/loot. now \`upload ${W.mission.leak_dest}\` to finish.`,"c-amber"); }
    else line("...but the job isn't done yet.","c-amber");
  },
  clear(){ out.innerHTML=''; }
};
function completeContract(){ if(S.objComplete && !S.done) win(); }

async function crackAnim(m,user,ip){
  if(user!==m.account.user){
    line(`host ${m.hostname} has no local user '${user}'.`,'c-amber');
    line(`(that may be the machine name — try the login handle you found in recon.)`,'c-dim'); return;
  }
  await typeLine(`attacking ${user}@${ip} ...`,'c-dim',5);
  const hit=S.wordlist.includes(m.account.password);
  const tries=Math.min(S.wordlist.length,8);
  for(let i=0;i<tries;i++){ await sleep(110);
    const m2=hit&&S.wordlist[i]===m.account.password;
    line(`  try: ${S.wordlist[i]}${m2?'  ✔ MATCH':''}`, m2?'c-cyan':'c-dim'); }
  if(hit){
    if(!S.wordlist.slice(0,tries).includes(m.account.password))
      line(`  ✔ MATCH after ${S.wordlist.indexOf(m.account.password)+1} tries`,'c-cyan');
    S.cracked.add(`${user}@${ip}`);
    line(`  credentials recovered → ${user}:${m.account.password}`,'c-cyan');
    line(`  now: connect ${ip}`,'c-dim');
  } else line(`  wordlist exhausted. password not derived from current intel — gather more.`,'c-amber');
}

function win(){
  S.done=true; stopTrace();
  line(""); line("════════════════════════════════════════════","c-cyan");
  line(" CONTRACT COMPLETE — clean exit, no trace.","c-cyan");
  line(` ${W.mission.target_name} will never know it was here.`,"c-cyan");
  line("════════════════════════════════════════════","c-cyan");
  line("Hit ⏏ contracts for the next job.","c-dim");
  lockInput();
}

/* ---- input loop ---- */
let cmdHist=[], histPtr=0;
cmd.addEventListener('keydown',async e=>{
  if(e.key==='ArrowUp'){ e.preventDefault();
    if(cmdHist.length){ histPtr=Math.max(0,histPtr-1); cmd.value=cmdHist[histPtr]||'';
      setTimeout(()=>cmd.setSelectionRange(cmd.value.length,cmd.value.length),0);} return; }
  if(e.key==='ArrowDown'){ e.preventDefault();
    if(cmdHist.length){ histPtr=Math.min(cmdHist.length,histPtr+1); cmd.value=cmdHist[histPtr]||'';} return; }
  if(e.key!=='Enter') return;
  const raw=cmd.value.trim(); cmd.value='';
  if(!raw) return;
  cmdHist.push(raw); histPtr=cmdHist.length;
  line(`root@${S.conn?activeHost().hostname:'localhost'}:~$ ${raw}`,'c-dim');
  const [name,...rest]=raw.split(/\s+/);
  const fn=CMD[name];
  if(!fn){ line(`${name}: command not found. try \`help\`.`,'c-amber'); return; }
  try{ await fn(rest.join(' ')); }catch(err){ line("internal error: "+err.message,'c-red'); }
});
document.getElementById('term').addEventListener('click',()=>{
  if(cmd.disabled) return;
  if(window.getSelection().toString()) return;
  cmd.focus({preventScroll:true});
});
document.getElementById('menu').onclick=()=>{ if(confirm("Abandon this contract and return to the board?")) showBoard(); };

/* ---- settings modal ---- */
const settingsEl=document.getElementById('settings');
function renderSettings(){
  document.getElementById('settings-rows').innerHTML=SETTINGS_DEFS.map(d=>`
    <div class="srow">
      <div class="stext"><div class="sl">${esc(d.label)}</div><div class="sd">${d.desc}</div></div>
      <button class="toggle" data-key="${d.key}" data-on="${!!SETTINGS[d.key]}">
        <span class="lbl">${SETTINGS[d.key]?'ON':'OFF'}</span><span class="knob"></span>
      </button>
    </div>`).join('');
  settingsEl.querySelectorAll('.toggle').forEach(btn=>btn.onclick=()=>{
    const k=btn.dataset.key; SETTINGS[k]=!SETTINGS[k];
    saveSettings(); applySettings(); renderSettings();
  });
}
document.getElementById('settings-btn').onclick=()=>{ renderSettings(); settingsEl.classList.remove('modal-hidden'); };
document.getElementById('settings-close').onclick=()=>settingsEl.classList.add('modal-hidden');
settingsEl.onclick=e=>{ if(e.target===settingsEl) settingsEl.classList.add('modal-hidden'); };

applySettings();
showBoard();
